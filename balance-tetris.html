// Per-cell torque contribution. Mode can override via mode.cellTorque(cell, r, c, center).
// Default: (col - center) * (cell.weight || 1).
function cellContribution(cell, r, c, center) {
  // Platform-contour cells are part of the rigid platform itself; they don't
  // contribute torque (the platform's CoM is at the fulcrum by definition).
  if (cell.platform) return 0;
  if (game && game.mode && game.mode.cellTorque) {
    return game.mode.cellTorque(cell, r, c, center);
  }
  return (c - center) * (cell.weight || 1);
}

  1: { side: -1, label: 'LEFT',  multiplier: 3, note: 'Moon seeks the lunar west' },

  5: { side:  1, label: 'RIGHT', multiplier: 2, note: 'Jupiter expands outward' },
  6: { side: -1, label: 'LEFT',  multiplier: 2, note: 'Saturn sinks to the west' }
};

function alchemyExitRule(trait) {
  return ALCHEMY_EXIT_RULES[trait] || { side: 0, label: 'EITHER', multiplier: 1, note: 'unfixed matter' };
}

function alchemyExitScore(group, dir, minGroup, singletonPenalty) {
  if (group.cells.length < minGroup) {
    return { delta: singletonPenalty, proper: false, rule: alchemyExitRule(group.trait) };
  }
  const rule = alchemyExitRule(group.trait);
  const proper = rule.side === 0 || rule.side === dir;
  const base = group.cells.length;
  return {
    delta: proper ? base * rule.multiplier : -Math.max(1, Math.floor(base / 2)),
    proper,
    rule
  };
}

function recomputeScore(g) {
  g.score = g.piecesPlaced + (g.lineBonus || 0) + (g.alchemyBonus || 0) + (g.wildBonus || 0);

// Weighted random pick of an item, or null if no item spawns
function rollItem() {
  if (Math.random() >= settings.alchemyItemRate) return null;
  const totalWeight = ITEM_KEYS.reduce((s, k) => s + ALCHEMY_ITEMS[k].spawnWeight, 0);
  let roll = Math.random() * totalWeight;
  for (const k of ITEM_KEYS) {
    roll -= ALCHEMY_ITEMS[k].spawnWeight;
    if (roll <= 0) return ALCHEMY_ITEMS[k];
  }
  return null;
}

// Flood-fill: find connected groups of cells sharing the same trait.
// Returns [{trait, cells: [[r,c], ...]}, ...]. Cells without a trait are singletons.
// Parse a human-readable starting grid (array of 10 strings, 10 chars each).
// Each char is a piece letter (I/O/T/S/Z/J/L), space/. for empty.
// Special chars: 'b' = bomb cell (fuse 5), '@' = balloon cell.
// Returns a fresh 10×10 grid.
function parseStartGrid(rows) {
  const grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  for (let r = 0; r < Math.min(rows.length, ROWS); r++) {
    const row = rows[r];
    for (let c = 0; c < Math.min(row.length, COLS); c++) {
      const ch = row[c];
      if (ch === ' ' || ch === '.') continue;
      let cell = null;
      if (ch === 'b') {
        cell = { color: '#e22', colorLight: '#f88', colorDark: '#900', bomb: true, fuse: 5 };
      } else if (ch === '@') {
        cell = { color: '#9df', colorLight: '#cef', colorDark: '#5ab', balloon: true };
      } else if (ch === 'a') {
        cell = wildCellFromId('apparition');
      } else if (ch === 'd') {
        cell = wildCellFromId('date878');
      } else if (ch === 'n') {
        cell = wildCellFromId('deadHost');
      } else if (ch === 'm') {
        cell = wildCellFromId('mirrorHunt');
      } else if (ch === 'r') {
        cell = wildCellFromId('huntsman');
      } else if (ch === 'q') {
        cell = wildCellFromId('hounds');
      } else if (ch === 'w') {
        cell = wildCellFromId('wind');
      } else if (ch === 'v') {
        cell = wildCellFromId('alembic');
      } else {
        const letter = ch.toUpperCase();
        if (PIECE_COLORS[letter]) {
          cell = {
            color: PIECE_COLORS[letter],
            colorLight: PIECE_COLORS_LIGHT[letter],
            colorDark: PIECE_COLORS_DARK[letter]
          };
        }
      }
      if (!cell) continue;
      grid[r][c] = cell;
    }
  }
  return grid;
}

function findGroups(grid) {
  const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  const groups = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (visited[r][c] || !grid[r][c]) continue;
      // Platform-contour cells are immovable — don't include them in any group
      if (grid[r][c].platform) { visited[r][c] = true; continue; }
      const trait = grid[r][c].trait;
      if (trait === undefined) {
        visited[r][c] = true;
        groups.push({ trait: null, cells: [[r, c]] });
        continue;
      }
      // BFS over same-trait 4-connected cells
      const cells = [];
      const stack = [[r, c]];
      while (stack.length) {
        const [rr, cc] = stack.pop();
        if (rr < 0 || rr >= ROWS || cc < 0 || cc >= COLS) continue;
        if (visited[rr][cc]) continue;
        const cell = grid[rr][cc];
        if (!cell || cell.trait !== trait) continue;
        visited[rr][cc] = true;
        cells.push([rr, cc]);
        stack.push([rr - 1, cc], [rr + 1, cc], [rr, cc - 1], [rr, cc + 1]);
      }
      groups.push({ trait, cells });
    }
  }
  return groups;
}

// Alchemy-specific group finder: Mercury cells (item) are WILDCARDS — they
// join any neighboring group regardless of trait. A Mercury at the seed
// position matches everything.
function findGroupsAlchemy(grid) {
  const isMercury = (cell) => cell && cell.item === 'mercury';
  const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  const groups = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (visited[r][c] || !grid[r][c]) continue;
      if (grid[r][c].platform) { visited[r][c] = true; continue; }
      const seedCell = grid[r][c];
      const seedTrait = seedCell.trait;
      if (seedTrait === undefined && !isMercury(seedCell)) {
        visited[r][c] = true;
        groups.push({ trait: null, cells: [[r, c]] });
        continue;
      }
      // BFS — match by trait OR mercury-wildcard on either side
      const cells = [];
      const stack = [[r, c]];
      // The group's primary trait is the seed's trait, unless seed is mercury
      // (in which case it inherits the first neighbor's trait it joins)
      let groupTrait = seedTrait;
      while (stack.length) {
        const [rr, cc] = stack.pop();
        if (rr < 0 || rr >= ROWS || cc < 0 || cc >= COLS) continue;
        if (visited[rr][cc]) continue;
        const cell = grid[rr][cc];
        if (!cell || cell.platform) continue;
        const merc = isMercury(cell);
        const match = merc
          || (groupTrait === undefined ? true : cell.trait === groupTrait);
        if (!match) continue;
        // First non-mercury cell sets the group's trait
        if (groupTrait === undefined && !merc) groupTrait = cell.trait;
        visited[rr][cc] = true;
        cells.push([rr, cc]);
        stack.push([rr - 1, cc], [rr + 1, cc], [rr, cc - 1], [rr, cc + 1]);
      }
      groups.push({ trait: groupTrait, cells });
    }
  }
  return groups;
}

            color: t.color,
            colorLight: t.colorLight,
            colorDark: t.colorDark,
            symbol: t.symbol
          };
        }
      }
      // Optionally bless one random filled cell with an alchemical item.
      // The item's emoji/color overrides the trait visual; the item flag is
      // stored separately so the cell still has its trait for group logic
      // (unless the item is Mercury, which makes the cell a wildcard).
      const item = rollItem();
      if (item) {
        const filled = [];
        for (let r = 0; r < piece.shape.length; r++)
          for (let c = 0; c < piece.shape[r].length; c++)
            if (piece.shape[r][c]) filled.push([r, c]);
        if (filled.length > 0) {
          const [r, c] = filled[Math.floor(Math.random() * filled.length)];
          const ci = piece.cellInfo[r][c];
          ci.item = item.id;
          ci.itemEmoji = item.emoji;
          // Tint the cell with the item's color
          ci.color = item.color;
          ci.colorLight = item.colorLight;
          ci.colorDark = item.colorDark;
          // Hide the trait symbol so the emoji is clear
          ci.symbol = item.emoji;
          piece.hasItem = item;
        }
      }
    },
    onPiecePlaced(g) {
      // Item effects fire FIRST so transmutations affect the group analysis.
      // Philosopher's Stone: transmute 4-adjacent cells to Sun (gold).
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = g.grid[r][c];
          if (cell && cell.item === 'philStone' && !cell._stoneFired) {
            cell._stoneFired = true;
            const sun = TRAITS[0];
            for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
              const rr = r + dr, cc = c + dc;
              if (rr<0||rr>=ROWS||cc<0||cc>=COLS) continue;
              const n = g.grid[rr][cc];
              if (!n || n.platform || n.item === 'salt') continue;
              n.trait = sun.id;
              n.color = sun.color;
              n.colorLight = sun.colorLight;
              n.colorDark = sun.colorDark;
              n.symbol = sun.symbol;
            }
            // Visual: brief flash
            g.flashTimer = Math.max(g.flashTimer, 25);
          }
        }
      }

      // Sliding pass — uses tunable settings
      applyPaletteAlchemy(g);

      const phys = computePhysics(g);
      const threshold = settings.alchemySlideThreshold / Math.max(0.25, settings.blockSlipperiness || 1);
      if (Math.abs(phys.angle) < threshold) return;
      const dir = Math.sign(phys.angle);
      if (dir === 0) return;

      const groups = findGroupsAlchemy(g.grid);
      groups.sort((a, b) => {
        const aEdge = dir > 0
          ? Math.max.apply(null, a.cells.map(([, c]) => c))
          : Math.min.apply(null, a.cells.map(([, c]) => c));
        const bEdge = dir > 0
          ? Math.max.apply(null, b.cells.map(([, c]) => c))
          : Math.min.apply(null, b.cells.map(([, c]) => c));
        return dir > 0 ? bEdge - aEdge : aEdge - bEdge;
      });

      const minGroup = settings.alchemyMinGroup;
      const penalty = settings.alchemySingletonPenalty;
      let scoreDelta = 0;
      let cellsLost = 0;
      for (const group of groups) {
        // Salt anchor: groups containing a Salt cell don't slide
        const hasSalt = group.cells.some(([rr, cc]) => {
          const cell = g.grid[rr][cc];
          return cell && cell.item === 'salt';
        });
        if (hasSalt) continue;

        const maxSteps = Math.max(1, settings.slideSteps | 0);
        let step = 1;
        if (group.cells.length >= minGroup) {
          const tiltRatio = Math.min(1, Math.abs(phys.angle) / Math.max(0.01, g.platform.maxTilt));
          const energy = tiltRatio * (settings.blockSlipperiness || 1) / Math.max(0.25, settings.blockFriction || 1);
          step = Math.max(1, Math.min(maxSteps, Math.ceil(energy * maxSteps)));
        }
        const newCells = group.cells.map(([r, c]) => [r, c + dir * step]);
        const fallsOff = newCells.some(([, c]) => c < 0 || c >= COLS);
        if (fallsOff) {
          const exit = alchemyExitScore(group, dir, minGroup, penalty);
          const valueMul = Math.max.apply(null, group.cells.map(([rr, cc]) => (g.grid[rr][cc] && g.grid[rr][cc].slideValueMul) || 1));
          scoreDelta += exit.delta * valueMul;
          for (const [rr, cc] of group.cells) g.grid[rr][cc] = null;
          cellsLost += group.cells.length;
          g.lastAlchemyExit = {
            trait: group.trait,
            dir,
            side: dir > 0 ? 'RIGHT' : 'LEFT',
            proper: exit.proper,
            delta: exit.delta * valueMul,
            size: group.cells.length,
            rule: exit.rule
          };
          continue;
        }
        const oldKeys = new Set(group.cells.map(([rr, cc]) => rr + ',' + cc));
        const blocked = newCells.some(([rr, cc]) => g.grid[rr][cc] && !oldKeys.has(rr + ',' + cc));
        if (blocked) continue;
        const data = group.cells.map(([rr, cc]) => g.grid[rr][cc]);
        for (const [rr, cc] of group.cells) g.grid[rr][cc] = null;
        newCells.forEach(([rr, cc], i) => { g.grid[rr][cc] = data[i]; });
      }

      if (cellsLost > 0) {
        g.alchemyBonus = (g.alchemyBonus || 0) + scoreDelta;
        recomputeScore(g);
        g.alchemyFlash = {
          delta: scoreDelta,
          frames: 60,
          exit: g.lastAlchemyExit
        };
        g.flashTimer = Math.max(g.flashTimer, 20);
        g.shakeX += (Math.random() - 0.5) * 8 * settings.shakeMul;
        g.shakeY += (Math.random() - 0.5) * 4 * settings.shakeMul;
      }
    }
  }
};

// ===== UTILITY =====
function rotateCW(shape) {
  const rows = shape.length, cols = shape[0].length;
  const r = [];
  for (let c = 0; c < cols; c++) {
    r.push([]);
    for (let row = rows - 1; row >= 0; row--) {
      r[c].push(shape[row][c]);
    }
  }
  return r;
}

function rotateCCW(shape) {
  return rotateCW(rotateCW(rotateCW(shape)));
}

function shuffled(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function screenToGridCol(mx, my, angle) {
  const dx = mx - FULCRUM_X;
  const dy = my - FULCRUM_Y;
  const cos = Math.cos(-angle);
  const sin = Math.sin(-angle);
  const lx = dx * cos - dy * sin + FULCRUM_X;
  return Math.floor((lx - GRID_LEFT) / CELL);
}

// Inverse-rotate the mouse Y to find which grid row it sits in (accounting
// for the platform's current tilt). Used by mouse to position pieces
// vertically — so you can drag a piece directly under an overhang.
function screenToGridRow(mx, my, angle) {
  const dx = mx - FULCRUM_X;
  const dy = my - FULCRUM_Y;
  const cos = Math.cos(-angle);
  const sin = Math.sin(-angle);
  const ly = dx * sin + dy * cos + FULCRUM_Y;
  return Math.floor((ly - GRID_TOP) / CELL);
}

function createGame(platformId, modeId, levelId) {
  // If levelId provided, override platform/mode from level config
  let level = null;
  let pid = platformId || 'seesaw';
  let mid = modeId || 'standard';
  if (levelId !== undefined && levelId !== null) {
    level = LEVELS.find(l => l.id === levelId);
    if (level) { pid = level.platform; mid = level.mode; }
  }
  const startGrid = level && level.startGrid
    ? parseStartGrid(level.startGrid)
    : Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  // Apply platform contour (pre-built platform-marker cells along a non-flat top)
  const platformDef = PLATFORMS[pid];
  if (platformDef && platformDef.contour) {
    for (let c = 0; c < COLS; c++) {
      const h = platformDef.contour[c] || 0;
      for (let i = 0; i < h; i++) {
        const r = ROWS - 1 - i;
        if (r < 0) break;
        // Don't overwrite startGrid cells (level designer's choice takes priority)
        if (!startGrid[r][c]) {
          startGrid[r][c] = {
            color: '#4a4a6a',
            colorLight: '#6a6a8a',
            colorDark: '#2a2a3a',
            platform: true
          };
        }
      }
    }
  }
  // Clone the platform so we can apply stiffness/maxTilt multipliers without
  // mutating the global PLATFORMS registry.
  const basePlatform = PLATFORMS[pid];
  const platform = Object.assign({}, basePlatform);
  platform.stiffness = (basePlatform.stiffness || 25) * settings.stiffnessMul;
  if (basePlatform.softStiffness !== undefined) {
    platform.softStiffness = basePlatform.softStiffness * settings.stiffnessMul;
  }
  platform.maxTilt = (basePlatform.maxTilt || Math.PI / 4) * settings.maxTiltMul;

  // Hot-seat multiplayer setup
  const playerCount = Math.max(1, Math.min(4, settings.playerCount | 0));
  const playerScores = Array(playerCount + 1).fill(0); // 1-indexed

  return {
    phase: 'menu', // menu | playing | dropping | gameOver
    menuMode: 'free', // 'free' | 'campaign' | 'settings'
    platform,
    platformId: pid,
    mode: MODES[mid],
    modeId: mid,
    level,
    levelComplete: false,
    selectedPlatformIdx: PLATFORM_ORDER.indexOf(pid),
    selectedModeIdx: MODE_ORDER.indexOf(mid),
    selectedLevelIdx: level ? LEVELS.findIndex(l => l.id === level.id) : 0,
    grid: startGrid,
    bag: [],
    current: null,    // { type, shape, color, colorDark, colorLight, col, playerId }
    next: [],         // array of 3 upcoming pieces
    score: 0,
    highScore: parseInt(localStorage.getItem('bb_highscore_' + pid + '_' + mid) || '0'),
    tiltAngle: 0,
    targetTilt: 0,
    lastTorqueData: { torque: 0 },
    piecesPlaced: 0,
    dropY: 0,
    dropTargetY: 0,
    dropPiece: null,
    dropCol: 0,
    dropRow: 0,
    mouseCol: -1,
    lastPlaceTime: 0,
    flashTimer: 0,
    introTimer: 0,
    balanceWarningFrames: 0,
    feedbackLog: [],
    feedbackTimer: 0,
    gameOverTimer: 0,
    shakeX: 0,
    shakeY: 0,

    // Hot-seat state
