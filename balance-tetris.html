  };
}

// ===== PIECE MANAGEMENT =====
function nextFromBag(g) {
  if (g.bag.length === 0) {
    g.bag = shuffled(PIECE_TYPES);
  }
  return g.bag.pop();
}

function makePiece(type) {
  return {
    type,
    shape: PIECE_SHAPES[type].map(r => r.slice()),
    color: PIECE_COLORS[type],
    colorDark: PIECE_COLORS_DARK[type],
    colorLight: PIECE_COLORS_LIGHT[type],
    col: Math.floor((COLS - PIECE_SHAPES[type][0].length) / 2)
  };
}

function fillQueue(g) {
  while (g.next.length < 3) {
    const p = makePiece(nextFromBag(g));
    // Apply mode's onSpawn at queue time so the next-piece preview is accurate
    if (g.mode.onSpawn) g.mode.onSpawn(g, p);
    g.next.push(p);
  }
}

function spawnPiece(g) {
  fillQueue(g);
  g.current = g.next.shift();
  fillQueue(g);
  // Hot-seat: tag the spawning piece with the current player
  g.current.playerId = g.currentPlayer;
  // Fall mode: piece starts above the grid and descends into it
  if (settings.fallSpeed > 0) {
    g.current.row = -g.current.shape.length;
    g.current.fallAccum = 0;
  }
  // If can't place at all at start position, adjust
  if (collides(g.grid, g.current.shape, g.current.col, 0)) {
    // Try to shift
    for (let offset = 0; offset <= COLS; offset++) {
      for (const dir of [0, -1, 1, -2, 2]) {
        const c = g.current.col + dir;
        if (c >= 0 && !collides(g.grid, g.current.shape, c, 0)) {
          g.current.col = c;
          return;
        }
      }
    }
  }
}

// Build a piece config from a palette selection (zodiac, prima, or compound)
// and REPLACE g.current with it. Mode-aware: the spawned piece has cell
// properties that the active mode's onPiecePlaced will interpret.
function spawnFromPalette(g, zodiacId, primaId) {
  if (g.phase !== 'playing' || !g.current) return;
  const z = zodiacId ? ZODIAC_PROCESSES.find(x => x.id === zodiacId) : null;
  const p = primaId ? TRIA_PRIMA_BUTTONS.find(x => x.id === primaId) : null;
  if (!z && !p) return;

  // Build colors: blend if both present, else use whichever exists
  let baseColor;
  if (z && p) baseColor = blendHex(z.color, p.color, 0.5);
  else baseColor = (z || p).color;
  const colorLight = lightenHex(baseColor, 0.3);
  const colorDark = darkenHex(baseColor, 0.3);
  const processTile = z ? ALCHEMY_PROCESS_TILES[z.id] : null;

  // Build the symbol shown on the cell
  let symbol = '';
  if (z && p) symbol = p.sign;
  else if (z) symbol = processTile ? processTile.emoji : z.sign;
  else if (p) symbol = p.sign;

  // Compose the piece — single cell for compound/principle, but if we want
  // to spawn an apparatus-shape piece we can extend later
  const shape = [[1]];
  const newPiece = {
    type: 'palette',
    shape,
    color: baseColor,
    colorLight, colorDark,
    col: Math.floor(COLS / 2),
    playerId: g.currentPlayer,
    // Mode-interpretable props
    paletteZodiac: z ? z.id : null,
    paletteProcess: z ? z.process.toLowerCase() : null,
    paletteElement: z ? z.element : null,
    palettePrima: p ? p.id : null,
    paletteName: paletteLabel(z, p),
    alchemyKind: z && !p ? 'apparatus' : 'substance',
    // Cell-level properties propagated to grid on lock (for Alchemy + Lab)
    cellInfo: [[ {
      color: baseColor,
      colorLight, colorDark,
      symbol,
      trait: traitForZodiac(z),
      item: p ? p.id : null,
      itemEmoji: p ? p.sign : undefined,
      alchemyKind: z && !p ? 'apparatus' : 'substance',
      paletteName: paletteLabel(z, p),
      paletteZodiac: z ? z.id : null,
      paletteProcess: z ? z.process.toLowerCase() : null,
      palettePrima: p ? p.id : null,
      paletteQuality: p ? p.quality : null,
      apparatus: processTile ? processTile.apparatus : null
    } ]],
    hasItem: p ? ALCHEMY_ITEMS[p.id] : null
  };

  // Preserve fall-mode state
  if (settings.fallSpeed > 0) {
    newPiece.row = (g.current.row !== undefined) ? g.current.row : -1;
    newPiece.fallAccum = 0;
  } else if (g.current.row !== undefined) {
    newPiece.row = g.current.row;
  }

  g.current = newPiece;
  g.paletteFlash = { zodiac: z, prima: p };
  g.paletteFlashFrames = 30;
}

// Element → trait mapping for the palette
function traitForZodiac(z) {
  if (!z) return undefined;
  // Fire → Mars (id 4); Water → Mercury (2); Air → Jupiter (5); Earth → Saturn (6)
  const map = { fire: 4, water: 2, air: 5, earth: 6 };
  return map[z.element];
}

function makeAsh(cell) {
  cell.color = '#77736a';
  cell.colorLight = '#aaa396';
  cell.colorDark = '#403c36';
  cell.symbol = '.';
  cell.weight = 0.3;
  cell.trait = undefined;
  cell.item = undefined;
}

function setTraitCell(cell, traitId) {
  const t = TRAITS[traitId];
  if (!t) return;
  cell.trait = t.id;
  cell.color = t.color;
  cell.colorLight = t.colorLight;
  cell.colorDark = t.colorDark;
  cell.symbol = t.symbol;
}

function neighbors4(r, c) {
  return [[r-1,c], [r+1,c], [r,c-1], [r,c+1]]
    .filter(([rr, cc]) => rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS);
}

function applyPaletteAlchemy(g) {
  let fired = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = g.grid[r][c];
      if (!cell || cell.platform || !cell.paletteZodiac || cell._paletteFired) continue;
      cell._paletteFired = true;
      fired++;

      if (cell.palettePrima === 'salt') {
        cell.item = 'salt';
        cell.symbol = cell.itemEmoji || '✴';
      } else if (cell.palettePrima === 'sulphur') {
        cell.item = 'sulphur';
        cell.symbol = cell.itemEmoji || '🜍';
        for (const [rr, cc] of neighbors4(r, c)) {
          const n = g.grid[rr][cc];
          if (n && !n.platform && n.item !== 'salt') makeAsh(n);
        }
      } else if (cell.palettePrima === 'mercury') {
        cell.item = 'mercury';
        cell.symbol = cell.itemEmoji || '☿';
        for (const [rr, cc] of neighbors4(r, c)) {
          const n = g.grid[rr][cc];
          if (n && !n.platform && n.item !== 'salt') {
            n.item = 'mercury';
            n.symbol = '☿';
            n.color = '#c0c8d8';
            n.colorLight = '#e8ecf4';
            n.colorDark = '#707888';
          }
        }
      }

      const process = cell.paletteProcess;
      if (process === 'calcination') {
        for (const [rr, cc] of neighbors4(r, c)) {
          const n = g.grid[rr][cc];
          if (n && !n.platform && n.item !== 'salt') makeAsh(n);
        }
      } else if (process === 'dissolution') {
        for (const [rr, cc] of neighbors4(r, c)) {
          const n = g.grid[rr][cc];
          if (n && !n.platform && n.item !== 'salt') {
            n.item = 'mercury';
            n.symbol = '☿';
          }
        }
      } else if (process === 'digestion' || process === 'incineration') {
        for (const [rr, cc] of neighbors4(r, c)) {
          const n = g.grid[rr][cc];
          if (n && !n.platform && n.item !== 'salt') setTraitCell(n, 4);
        }
      } else if (process === 'congelation' || process === 'fixation') {
        for (const [rr, cc] of neighbors4(r, c)) {
          const n = g.grid[rr][cc];
          if (n && !n.platform) n.item = 'salt';
        }
      } else if (process === 'sublimation') {
        cell.weight = 0.5;
      } else if (process === 'multiplication') {
        cell.slideValueMul = 2;
      } else if (process === 'projection') {
        for (let cc = 0; cc < COLS; cc++) {
          const n = g.grid[r][cc];
          if (n && !n.platform && n.item !== 'salt') setTraitCell(n, cell.trait);
        }
      } else if (process === 'distillation') {
        for (let rr = 0; rr < ROWS; rr++) {
          const n = g.grid[rr][c];
          if (n && !n.platform && n.item !== 'salt') n.weight = Math.max(0.5, (n.weight || 1) * 0.75);
        }
      }
    }
  }
  if (fired) {
    g.flashTimer = Math.max(g.flashTimer, 25);
    g.paletteFlashFrames = Math.max(g.paletteFlashFrames, 40);
  }
}

function ensureWildHunt(g) {
  if (!g.hunt) {
    g.hunt = {
      dawn: 0,
      meter: 0,
      credibility: 100,
      chronicleEntries: 0,
      lastBeat: 'quiet',
      beatFlash: 0,
      beatBag: [],
      spawnBag: [],
      windDir: 0,
      windFrames: 0,
      riderTorque: 0,
      riderFrames: 0,
      forcedTile: null
    };
  }
  return g.hunt;
}

function pickWildHuntTile(g) {
  const h = ensureWildHunt(g);
  if (h.forcedTile) {
    const id = h.forcedTile;
    h.forcedTile = null;
    return WILD_HUNT_TILES[id] || WILD_HUNT_TILES.apparition;
  }
  if (h.spawnBag.length === 0) h.spawnBag = shuffled(WILD_SPAWN_BAG);
  return WILD_HUNT_TILES[h.spawnBag.pop()] || WILD_HUNT_TILES.apparition;
}

function nextWildBeat(g) {
  const h = ensureWildHunt(g);
  if (h.beatBag.length === 0) h.beatBag = shuffled(WILD_BEAT_BAG);
  return h.beatBag.pop();
}

function wildTileCell(tile) {
  return {
    color: tile.color,
    colorLight: tile.colorLight,
    colorDark: tile.colorDark,
    symbol: tile.symbol,
    weight: tile.weight,
    wildId: tile.id,
    wildName: tile.name,
    wildClass: tile.wildClass,
    wildVolatile: !!tile.volatile,
    wildDeceptive: !!tile.deceptive,
    chronicleValue: tile.chronicleValue || 0
  };
}

function wildCellFromId(id) {
  const tile = WILD_HUNT_TILES[id] || WILD_HUNT_TILES.apparition;
  const cell = wildTileCell(tile);
  return {
    color: cell.color,
    colorLight: cell.colorLight,
    colorDark: cell.colorDark,
    symbol: cell.symbol,
    weight: cell.weight,
    wildId: cell.wildId,
    wildName: cell.wildName,
    wildClass: cell.wildClass,
    wildVolatile: cell.wildVolatile,
    wildDeceptive: cell.wildDeceptive,
    chronicleValue: cell.chronicleValue
  };
}

function fireWildBeat(g, beat) {
  const h = ensureWildHunt(g);
  h.lastBeat = beat;
  h.beatFlash = 60;
  if (beat === 'hounds') {
    wildShove(g, wildShoveDir(g));
    h.credibility = Math.max(0, h.credibility - 2);
  } else if (beat === 'wind') {
    h.windDir = Math.random() < 0.5 ? -1 : 1;
    h.windFrames = 150;
    h.credibility = Math.max(0, h.credibility - 1);
  } else if (beat === 'hoofbeat') {
    g.shakeX += (Math.random() - 0.5) * 26 * settings.shakeMul;
    g.shakeY += (Math.random() - 0.5) * 14 * settings.shakeMul;
    h.credibility = Math.max(0, h.credibility - 1);
  } else if (beat === 'horn') {
    h.forcedTile = 'huntsman';
    h.riderTorque = Math.random() < 0.5 ? -8 : 8;
    h.riderFrames = 90;
  } else if (beat === 'deadHost') {
    seedWildHost(g);
    h.credibility = Math.max(0, h.credibility - 3);
  }
  const phys = computePhysics(g);
  g.targetTilt = phys.angle;
  g.lastTorqueData = phys.torqueData;
  if (h.credibility <= 0) triggerGameOver(g);
}

function wildShoveDir(g) {
  if (Math.abs(g.targetTilt) > 0.05) return Math.sign(g.targetTilt);
  return Math.random() < 0.5 ? -1 : 1;
}

function wildShove(g, dir) {
  const cells = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = g.grid[r][c];
      if (!cell || cell.platform || cell.item === 'salt') continue;
      if (cell.wildVolatile || cell.wildClass === 'apparition' || cell.wildClass === 'illusion') {
        cells.push([r, c]);
      }
    }
  }
  cells.sort((a, b) => dir > 0 ? b[1] - a[1] : a[1] - b[1]);
  let lost = 0;
  for (const [r, c] of cells) {
    const cell = g.grid[r][c];
    if (!cell) continue;
    const nc = c + dir;
    if (nc < 0 || nc >= COLS) {
      g.wildBonus = (g.wildBonus || 0) + wildExitValue(cell, dir);
      g.grid[r][c] = null;
      lost++;
    } else if (!g.grid[r][nc]) {
      g.grid[r][nc] = cell;
      g.grid[r][c] = null;
    }
  }
  if (lost || cells.length) {
    g.shakeX += dir * 7 * settings.shakeMul;
    g.flashTimer = Math.max(g.flashTimer, 20);
    recomputeScore(g);
  }
}

function wildExitValue(cell, dir) {
  if (!cell.chronicled) return cell.wildClass === 'huntsman' ? -35 : -6;
  if (cell.wildClass === 'huntsman') {
    // First-pass side rule: the dated Huntsman pays best when driven east/right.
    return dir > 0 ? 90 : 30;
  }
  if (cell.wildClass === 'host') return (cell.chronicleValue || 18) + 10;
  return cell.chronicleValue || 10;
}

function seedWildHost(g) {
  const side = Math.random() < 0.5 ? 0 : COLS - 1;
  const dir = side === 0 ? 1 : -1;
  let placed = 0;
  for (let r = ROWS - 1; r >= 0 && placed < 3; r--) {
    const c = side + placed * dir;
    if (c >= 0 && c < COLS && !g.grid[r][c]) {
      g.grid[r][c] = wildCellFromId('deadHost');
      placed++;
    }
  }
}

function applyWildChronicle(g) {
  const h = ensureWildHunt(g);
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = g.grid[r][c];
      if (!cell || cell.platform || cell.wildClass !== 'chronicle' || cell._chronicleFired) continue;
      let chronicled = 0;
      for (const [rr, cc] of neighbors4(r, c)) {
        const n = g.grid[rr][cc];
        if (!n || n.platform || n.chronicled) continue;
        if (['apparition', 'host', 'huntsman', 'illusion', 'omen'].includes(n.wildClass)) {
          n.chronicled = true;
          n.wildDeceptive = false;
          n.colorLight = '#fff1a8';
          n.symbol = n.symbol || '📖';
          chronicled++;
          h.chronicleEntries++;
          h.credibility = Math.min(100, h.credibility + 4);
          g.wildBonus = (g.wildBonus || 0) + (n.chronicleValue || 12);
        }
      }
      if (chronicled) {
        cell._chronicleFired = true;
        cell.symbol = '📖';
      }
    }
  }
}

function applyWildCounters(g) {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = g.grid[r][c];
      if (!cell || cell.platform || cell._wildCounterFired) continue;
      const process = cell.paletteProcess;
      const isAlembic = cell.wildId === 'alembic';
      if (isAlembic || process === 'distillation' || process === 'dissolution') {
        cell._wildCounterFired = true;
        for (let rr = 0; rr < ROWS; rr++) {
          const n = g.grid[rr][c];
          if (n && n.wildDeceptive) {
            n.wildDeceptive = false;
            n.symbol = '👁️';
            n.colorLight = '#f1f7ff';
            g.wildBonus = (g.wildBonus || 0) + 8;
          }
        }
      } else if (process === 'calcination' || process === 'incineration') {
        cell._wildCounterFired = true;
        for (const [rr, cc] of neighbors4(r, c)) {
          const n = g.grid[rr][cc];
          if (n && n.wildClass === 'illusion' && !n.wildDeceptive) {
            makeAsh(n);
            n.symbol = '⚱️';
            g.wildBonus = (g.wildBonus || 0) + 14;
          }
        }
      } else if (process === 'fixation' || process === 'congelation' || cell.palettePrima === 'salt') {
        cell._wildCounterFired = true;
        for (const [rr, cc] of neighbors4(r, c)) {
          const n = g.grid[rr][cc];
          if (n && n.wildClass) {
            n.item = 'salt';
            n.wildVolatile = false;
            n.chronicled = true;
          }
        }
      }
    }
  }
}

// Color helpers: blend / lighten / darken hex strings
function blendHex(a, b, t) {
  const pa = hexToRgb(a), pb = hexToRgb(b);
  const r = Math.round(pa[0] + (pb[0] - pa[0]) * t);
  const g = Math.round(pa[1] + (pb[1] - pa[1]) * t);
  const bl = Math.round(pa[2] + (pb[2] - pa[2]) * t);
  return rgbToHex(r, g, bl);
}
function lightenHex(c, t) {
  const [r, g, b] = hexToRgb(c);
  return rgbToHex(Math.round(r + (255 - r) * t), Math.round(g + (255 - g) * t), Math.round(b + (255 - b) * t));
}
function darkenHex(c, t) {
  const [r, g, b] = hexToRgb(c);
  return rgbToHex(Math.round(r * (1 - t)), Math.round(g * (1 - t)), Math.round(b * (1 - t)));
}
function hexToRgb(h) {
  h = h.replace('#', '');
  if (h.length === 3) h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}
function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(x => {
    const h = Math.max(0, Math.min(255, x)).toString(16);
    return h.length === 1 ? '0' + h : h;
  }).join('');
}

// ===== COLLISION =====
function collides(grid, shape, col, row) {
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const gr = row + r;
      const gc = col + c;
      if (gc < 0 || gc >= COLS) return true;
      if (gr >= ROWS) return true;
      if (gr >= 0 && grid[gr][gc] !== null) return true;
    }
  }
  return false;
}

function findLandingRow(grid, shape, col) {
  let row = -shape.length;
  while (row < ROWS) {
    if (collides(grid, shape, col, row + 1)) return row;
    row++;
  }
  return row;
}

function isValidCol(grid, shape, col) {
  // Check if piece fits horizontally
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const gc = col + c;
      if (gc < 0 || gc >= COLS) return false;
    }
  }
  return true;
}

// ===== PHYSICS =====
// Routes through the active platform.
function computePhysics(g) {
  let td = g.platform.computeTorque(g.grid);
  if (g.mode && g.mode.onTorqueAdjust) {
    td = g.mode.onTorqueAdjust(g, Object.assign({}, td)) || td;
  }
  const angle = g.platform.tiltAngle(td);
  return { torqueData: td, angle };
}

function isStableEnoughAfterPlacement(g) {
  if (g.platform.isStable(g.targetTilt, g.lastTorqueData)) return true;

  // Give the player a real opening. The tabletop version is fun because the
  // first few moves teach you the board; instant failure teaches nothing.
  // This grace is intentionally small: it prevents first-move gotchas while
  // still letting genuinely wild stacks fail.
  const baseLimit = g.platform.maxTilt || Math.PI / 4;
  const gracePlacements = g.modeId === 'wildhunt' ? 2 : 1;
  const graceLimit = Math.min(Math.PI * 0.62, baseLimit * (g.modeId === 'wildhunt' ? 1.85 : 1.55));
  if (g.piecesPlaced <= gracePlacements && Math.abs(g.targetTilt) <= graceLimit) {
    g.balanceWarningFrames = 150;
    return true;
  }
  return false;
}

function pieceColumnLabel(piece) {
  if (!piece) return 'column ?';
  const shape = piece.shape || [];
  let left = shape[0] ? shape[0].length : 0;
  let right = -1;
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      left = Math.min(left, c);
      right = Math.max(right, c);
    }
  }
  if (right < 0) return 'column ?';
  const start = piece.col + left + 1;
  const end = piece.col + right + 1;
  return start === end ? `column ${start}` : `columns ${start}-${end}`;
}

function tiltFeedback(g) {
  const angle = g.targetTilt !== undefined ? g.targetTilt : g.tiltAngle;
  const deg = Math.round(Math.abs(angle) * 180 / Math.PI);
  if (deg <= 1) return 'platform nearly level';
  return `tipping ${angle > 0 ? 'right' : 'left'} ${deg} deg`;
}

function addFeedback(g, text) {
  if (!g) return;
  g.feedbackLog = g.feedbackLog || [];
  g.feedbackLog.unshift(text);
  g.feedbackLog = g.feedbackLog.slice(0, 5);
  g.feedbackTimer = 240;
}

function currentPieceFeedback(g, action) {
  if (!g || !g.current) return;
  const cur = g.current;
  const rowText = cur.row !== undefined ? `row ${cur.row + 1}` : 'above grid';
  addFeedback(g, `${action}: ${cur.type}-piece to ${pieceColumnLabel(cur)}, ${rowText}; ${tiltFeedback(g)}.`);
}

// ===== PLACEMENT =====
function lockPiece(g, piece, col, row) {
  const shape = piece.shape;
  const placedType = piece.type;
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const gr = row + r;
      const gc = col + c;
      if (gr >= 0 && gr < ROWS && gc >= 0 && gc < COLS) {
        const cell = {
          color: piece.color,
          colorDark: piece.colorDark,
          colorLight: piece.colorLight
        };
        // Per-cell info from mode (Alchemy: trait-specific color + symbol + item)
        if (piece.cellInfo && piece.cellInfo[r] && piece.cellInfo[r][c]) {
          const ci = piece.cellInfo[r][c];
          cell.color = ci.color;
          cell.colorLight = ci.colorLight;
          cell.colorDark = ci.colorDark;
          if (ci.symbol !== undefined) cell.symbol = ci.symbol;
          if (ci.trait !== undefined) cell.trait = ci.trait;
          if (ci.item !== undefined) cell.item = ci.item;
          if (ci.itemEmoji !== undefined) cell.itemEmoji = ci.itemEmoji;
          if (ci.alchemyKind !== undefined) cell.alchemyKind = ci.alchemyKind;
          if (ci.paletteName !== undefined) cell.paletteName = ci.paletteName;
          if (ci.paletteZodiac !== undefined) cell.paletteZodiac = ci.paletteZodiac;
          if (ci.paletteProcess !== undefined) cell.paletteProcess = ci.paletteProcess;
          if (ci.palettePrima !== undefined) cell.palettePrima = ci.palettePrima;
          if (ci.paletteQuality !== undefined) cell.paletteQuality = ci.paletteQuality;
          if (ci.apparatus !== undefined) cell.apparatus = ci.apparatus;
          if (ci.weight !== undefined) cell.weight = ci.weight;
          if (ci.wildId !== undefined) cell.wildId = ci.wildId;
          if (ci.wildName !== undefined) cell.wildName = ci.wildName;
          if (ci.wildClass !== undefined) cell.wildClass = ci.wildClass;
          if (ci.wildVolatile !== undefined) cell.wildVolatile = ci.wildVolatile;
          if (ci.wildDeceptive !== undefined) cell.wildDeceptive = ci.wildDeceptive;
          if (ci.chronicleValue !== undefined) cell.chronicleValue = ci.chronicleValue;
        }
        // Propagate per-piece flags into the grid cell
        if (piece.balloon) cell.balloon = true;
        if (piece.bomb) { cell.bomb = true; cell.fuse = piece.fuse || 5; }
        if (piece.weight !== undefined) cell.weight = piece.weight;
        if (piece.playerId) cell.playerId = piece.playerId;
        g.grid[gr][gc] = cell;
      }
    }
  }
  g.piecesPlaced++;
  // Per-player score in hot-seat; global score otherwise
  if (g.playerCount > 1) {
    g.playerScores[piece.playerId] = (g.playerScores[piece.playerId] || 0) + 1;
  }
  recomputeScore(g);
  // Mode hook: settle pass (bombs detonate, surfaces slide, etc.)
  // Runs BEFORE physics recompute so cascade effects on torque are reflected immediately.
  if (g.mode.onPiecePlaced) g.mode.onPiecePlaced(g);
  // Line clear (after mode effects so cascades resolve first)
  clearLines(g);
  const phys = computePhysics(g);
  g.targetTilt = phys.angle;
  g.lastTorqueData = phys.torqueData;
  g.flashTimer = 15;
  // Track the player who just placed (for tipper attribution if this is the tip)
  g.lastPlacingPlayer = piece.playerId;
  addFeedback(g, `Placed ${placedType}-piece at ${pieceColumnLabel({ shape, col })}, row ${Math.max(1, row + 1)}; ${tiltFeedback(g)}.`);
  // Advance to next player (only after lockPiece returns successfully and no game over)
  // Done by caller (in the dropping update path or lockFromCurrent) since
  // they check stability first.
}

function startDrop(g) {
  const cur = g.current;
  const landRow = findLandingRow(g.grid, cur.shape, cur.col);
  addFeedback(g, `Hard drop started: ${cur.type}-piece aimed at ${pieceColumnLabel(cur)}, landing row ${Math.max(1, landRow + 1)}.`);
  g.dropPiece = cur;
  g.dropCol = cur.col;
  g.dropRow = landRow;
  g.dropY = GRID_TOP - CELL * 2;
  g.dropTargetY = GRID_TOP + landRow * CELL;
  g.phase = 'dropping';
  g.current = null;
}

// Used by fall mode: piece is already at cur.row, lock it directly without
// the dropping-animation phase. Runs all the same post-lock checks.
function lockFromCurrent(g) {
  const cur = g.current;
  const lr = cur.row;
  if (lr < 0) { triggerGameOver(g); return; }
  lockPiece(g, cur, cur.col, lr);
  g.dropRow = lr;
  // Shake proportional to tilt change
  const angleDelta = Math.abs(g.targetTilt - g.tiltAngle);
  g.shakeX = (Math.random() - 0.5) * angleDelta * 20 * settings.shakeMul;
  g.shakeY = (Math.random() - 0.5) * angleDelta * 10 * settings.shakeMul;
  if (!isStableEnoughAfterPlacement(g)) { triggerGameOver(g); return; }
  if (lr < 0) { triggerGameOver(g); return; }
  checkLevelWin(g);
  if (g.levelComplete) return;
  advancePlayer(g);
  spawnPiece(g);
}

// Hot-seat: advance to the next player. Solo mode = no-op.
function advancePlayer(g) {
  if (g.playerCount > 1) {
    g.currentPlayer = (g.currentPlayer % g.playerCount) + 1;
  }
}

// Palette: zodiac click. If a zodiac is already armed, spawn with it alone
// (replace current piece). If no zodiac armed, arm this one with a 3-second
// timeout, waiting for a Tria Prima follow-up.
function handlePaletteZodiac(g, zodiacId) {
  if (g.phase !== 'playing' || !g.current) return;
  const z = ZODIAC_PROCESSES.find(x => x.id === zodiacId);
  if (g.paletteZodiac === zodiacId) {
    // Double-click same zodiac → spawn pure-zodiac piece
    spawnFromPalette(g, zodiacId, null);
    addFeedback(g, `Palette: spawned ${z ? z.process : zodiacId} apparatus piece.`);
    g.paletteZodiac = null;
  } else {
    // Single click → arm it
    g.paletteZodiac = zodiacId;
    g.paletteExpiresAt = Date.now() + 3000;
    addFeedback(g, `Palette armed: ${z ? z.sign + ' ' + z.process : zodiacId}. Choose Salt, Sulphur, or Mercury next.`);
  }
}

// Palette: Tria Prima click. If zodiac is armed, spawn compound. Otherwise
// spawn pure-principle.
function handlePalettePrima(g, primaId) {
  if (g.phase !== 'playing' || !g.current) return;
  const zod = g.paletteZodiac;
  const z = ZODIAC_PROCESSES.find(x => x.id === zod);
  const p = TRIA_PRIMA_BUTTONS.find(x => x.id === primaId);
  if (zod && Date.now() < g.paletteExpiresAt) {
    spawnFromPalette(g, zod, primaId);
    addFeedback(g, `Palette: spawned ${p ? p.name : primaId} ${z ? z.process : zod} substance.`);
  } else {
    spawnFromPalette(g, null, primaId);
    addFeedback(g, `Palette: spawned pure ${p ? p.name : primaId} matter.`);
  }
  g.paletteZodiac = null;
}

// Clear armed zodiac if it expired (called from update loop)
function checkPaletteExpiry(g) {
  if (g.paletteZodiac && Date.now() >= g.paletteExpiresAt) {
    // Auto-fire the pure-zodiac on expiry
    const z = ZODIAC_PROCESSES.find(x => x.id === g.paletteZodiac);
    spawnFromPalette(g, g.paletteZodiac, null);
    addFeedback(g, `Palette timeout: spawned ${z ? z.process : g.paletteZodiac} apparatus piece.`);
    g.paletteZodiac = null;
  }
}

// Line clearing: find full rows and remove their non-platform cells.
// Platform-contour cells stay. Bonus score: 1/3/5/8 for 1/2/3/4 lines.
// Returns the count of rows cleared.
function clearLines(g) {
  if (settings.lineClear !== 'classic') return 0;
  const cleared = [];
  for (let r = 0; r < ROWS; r++) {
    let allFilled = true;
    let hasPlayerCell = false;
    for (let c = 0; c < COLS; c++) {
      if (!g.grid[r][c]) { allFilled = false; break; }
      if (!g.grid[r][c].platform) hasPlayerCell = true;
    }
    // Skip rows that are full only because of platform cells
    if (allFilled && hasPlayerCell) cleared.push(r);
  }
  if (cleared.length === 0) return 0;
  // Clear non-platform cells in those rows
  for (const r of cleared) {
    for (let c = 0; c < COLS; c++) {
      const cell = g.grid[r][c];
      if (cell && !cell.platform) g.grid[r][c] = null;
    }
  }
  // Award line-clear bonus
  const bonuses = [0, 1, 3, 5, 8];
  const bonus = bonuses[Math.min(cleared.length, 4)];
  g.lineBonus = (g.lineBonus || 0) + bonus;
  g.linesCleared = (g.linesCleared || 0) + cleared.length;
  recomputeScore(g);
  // Visual: flash rows briefly
  g.lineFlash = { rows: cleared, frames: 30 };
  g.flashTimer = Math.max(g.flashTimer, 25);
  return cleared.length;
}

// ===== INPUT =====
const keys = {};

document.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;

  if (game.phase === 'menu') {
    if (e.code === 'KeyC') {
      // Toggle campaign/free
      game.menuMode = game.menuMode === 'campaign' ? 'free' : 'campaign';
    } else if (game.menuMode === 'campaign') {
      // Level grid navigation: 5 cols × 3 rows (15 levels)
      const COLS_GRID = 5;
      if (e.code === 'ArrowLeft') {
        game.selectedLevelIdx = (game.selectedLevelIdx - 1 + LEVELS.length) % LEVELS.length;
      } else if (e.code === 'ArrowRight') {
        game.selectedLevelIdx = (game.selectedLevelIdx + 1) % LEVELS.length;
      } else if (e.code === 'ArrowDown') {
        game.selectedLevelIdx = (game.selectedLevelIdx + COLS_GRID) % LEVELS.length;
      } else if (e.code === 'ArrowUp') {
        game.selectedLevelIdx = (game.selectedLevelIdx - COLS_GRID + LEVELS.length) % LEVELS.length;
      } else if (e.code === 'Enter' || e.code === 'Space') {
        startGame(null, null, LEVELS[game.selectedLevelIdx].id);
      }
    } else {
      // Free play
      if (e.code === 'ArrowLeft') {
        game.selectedPlatformIdx = (game.selectedPlatformIdx - 1 + PLATFORM_ORDER.length) % PLATFORM_ORDER.length;
      } else if (e.code === 'ArrowRight') {
        game.selectedPlatformIdx = (game.selectedPlatformIdx + 1) % PLATFORM_ORDER.length;
      } else if (e.code === 'Tab' || e.code === 'KeyM') {
        game.selectedModeIdx = (game.selectedModeIdx + 1) % MODE_ORDER.length;
      } else if (e.code === 'Enter' || e.code === 'Space') {
        startGame(PLATFORM_ORDER[game.selectedPlatformIdx], MODE_ORDER[game.selectedModeIdx]);
      }
    }
    e.preventDefault();
    return;
  }

  if (game.phase === 'gameOver') {
    if (e.code === 'Enter' && game.levelComplete) {
      // Advance to next level if available
      const next = LEVELS.find(L => L.id === game.level.id + 1);
      startGame(null, null, next ? next.id : game.level.id);
    } else if (e.code === 'KeyR' || e.code === 'Space' || e.code === 'Enter') {
      // Restart: same level if in campaign, same platform/mode otherwise
      if (game.level) {
        startGame(null, null, game.level.id);
      } else {
        startGame();
      }
    } else if (e.code === 'Escape') {
      // Back to menu (preserves the menuMode you were in)
      const wasCampaign = !!game.level;
      game = createGame(game.platformId, game.modeId);
      if (wasCampaign) game.menuMode = 'campaign';
    }
    e.preventDefault();
    return;
  }

  if (game.phase !== 'playing' || !game.current) return;

  // Help overlay toggle
  if (e.code === 'KeyH' || e.code === 'Slash') {
    game.showHelp = !game.showHelp;
    e.preventDefault();
    return;
  }

  // Palette: zodiac shortcuts (1-9, 0, -, =) and Tria Prima shortcuts (Q, W, E)
  const zIdx = ZODIAC_KEYS.indexOf(e.code);
  if (zIdx >= 0) {
    handlePaletteZodiac(game, ZODIAC_PROCESSES[zIdx].id);
    e.preventDefault();
    return;
  }
  const pIdx = PRIMA_KEYS.indexOf(e.code);
  if (pIdx >= 0) {
    handlePalettePrima(game, TRIA_PRIMA_BUTTONS[pIdx].id);
    e.preventDefault();
    return;
  }

  const cur = game.current;
  const inFall = cur.row !== undefined; // fall mode is active for this piece
  // For fall mode, validate moves against the piece's current row (so it can't
  // pass through existing blocks at that row). For floating mode, just bounds.
  const canMove = (shape, col) => inFall
    ? !collides(game.grid, shape, col, cur.row)
    : isValidCol(game.grid, shape, col);

  switch (e.code) {
    case 'ArrowLeft':
      if (canMove(cur.shape, cur.col - 1)) {
        cur.col--;
        currentPieceFeedback(game, 'Move left');
      } else {
        addFeedback(game, `Move left blocked at ${pieceColumnLabel(cur)}.`);
      }
      break;
    case 'ArrowRight':
      if (canMove(cur.shape, cur.col + 1)) {
        cur.col++;
        currentPieceFeedback(game, 'Move right');
      } else {
        addFeedback(game, `Move right blocked at ${pieceColumnLabel(cur)}.`);
      }
      break;
    case 'ArrowUp':
    case 'KeyX': {
      const rotated = rotateCW(cur.shape);
      // Wall kick: try 0, -1, +1, -2, +2
      for (const kick of [0, -1, 1, -2, 2]) {
        if (canMove(rotated, cur.col + kick)) {
          cur.shape = rotated;
          cur.col += kick;
          currentPieceFeedback(game, kick ? `Rotate clockwise with wall-kick ${kick}` : 'Rotate clockwise');
          break;
        }
      }
      break;
    }
    case 'KeyZ': {
      const rotated = rotateCCW(cur.shape);
      for (const kick of [0, -1, 1, -2, 2]) {
        if (canMove(rotated, cur.col + kick)) {
          cur.shape = rotated;
          cur.col += kick;
          currentPieceFeedback(game, kick ? `Rotate counter-clockwise with wall-kick ${kick}` : 'Rotate counter-clockwise');
          break;
        }
      }
      break;
    }
    case 'Space':
    case 'Enter':
      // Hard drop: in fall mode, snap to landing and lock. In floating mode,
      // start the dropping animation as before.
      if (inFall) {
        const lr = findLandingRow(game.grid, cur.shape, cur.col);
        cur.row = Math.max(lr, cur.row);
        lockFromCurrent(game);
      } else {
        startDrop(game);
      }
      break;
    case 'ArrowDown':
      // Auto-fall mode (settings.fallSpeed > 0): ArrowDown held = soft-drop
      // multiplier, handled per-frame in update(). No per-press action.
      if (settings.fallSpeed > 0 && inFall) break;
      // Manual mode: pressing Down lowers the piece into the grid so you can
      // slide it sideways under overhangs. First press in floating mode drops
      // the piece to the top of the grid immediately; subsequent presses step
      // down one row at a time. When the piece can't move further, it locks.
      if (!inFall) {
        // Enter the grid at row 0 (top of grid). The piece's filled cells
        // start at the top edge.
        if (collides(game.grid, cur.shape, cur.col, 0)) {
          // Top is blocked — game over (grid is too full)
          cur.row = 0;
          lockFromCurrent(game);
        } else {
          cur.row = 0;
          cur.fallAccum = 0;
          currentPieceFeedback(game, 'Step into grid');
        }
      } else {
        // Already in-grid: step down one row, or lock if blocked
        const newRow = cur.row + 1;
        if (collides(game.grid, cur.shape, cur.col, newRow)) {
          addFeedback(game, `Step down blocked; locking ${cur.type}-piece at ${pieceColumnLabel(cur)}, row ${cur.row + 1}.`);
          lockFromCurrent(game);
        } else {
          cur.row = newRow;
          currentPieceFeedback(game, 'Step down');
        }
      }
      break;
  }
  e.preventDefault();
});

document.addEventListener('keyup', e => {
  keys[e.code] = false;
});

// Mouse
let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;

  if (game && game.phase === 'playing' && game.current) {
    // Don't drag the piece when the cursor is over the palette button row
    if (mouseY >= CANVAS_H - 54) return;
    const col = screenToGridCol(mouseX, mouseY, game.tiltAngle);
    const row = screenToGridRow(mouseX, mouseY, game.tiltAngle);
    if (col >= 0 && col < COLS) {
      game.mouseCol = col;
      const shape = game.current.shape;
      // Find leftmost / rightmost FILLED columns in the shape (ignoring empty
      // columns of the bounding box). Without this, a vertical I-piece
      // (filled cell only at relative col 2 of a 4-wide bbox) gets clamped
      // 3 columns short of the right edge.
      let leftFilled = shape[0].length, rightFilled = -1;
      for (let r = 0; r < shape.length; r++) {
        for (let c = 0; c < shape[r].length; c++) {
          if (shape[r][c]) {
            if (c < leftFilled)  leftFilled = c;
            if (c > rightFilled) rightFilled = c;
          }
        }
      }
      const filledW = rightFilled - leftFilled + 1;
      // Center the piece's filled span on the mouse column
      const desired = col - leftFilled - Math.floor(filledW / 2);
      // Clamp so the FILLED cells (not the bbox) stay on the grid
      const minCol = -leftFilled;            // leftmost filled cell at col 0
      const maxCol = COLS - 1 - rightFilled; // rightmost filled cell at col COLS-1
      const newCol = Math.max(minCol, Math.min(maxCol, desired));

      // ===== Vertical positioning =====
      // Auto-fall mode: piece descends automatically — mouse only adjusts col.
      // Floating mode (fallSpeed=0): mouse Y controls the row too, so the
      // user can drag the piece directly under overhangs and click to lock.
      if (settings.fallSpeed > 0 && game.current.row !== undefined) {
        // Auto-fall: just update col if valid at current row
        if (!collides(game.grid, shape, newCol, game.current.row)) {
          const oldCol = game.current.col;
          game.current.col = newCol;
          if (oldCol !== newCol) currentPieceFeedback(game, 'Mouse aim');
        }
      } else {
        // Floating mode
        if (row < 0) {
          // Mouse above grid: piece floats (cur.row undefined)
          if (isValidCol(game.grid, shape, newCol)) {
            const oldCol = game.current.col;
            const oldRow = game.current.row;
            game.current.col = newCol;
            game.current.row = undefined;
            if (oldCol !== newCol || oldRow !== undefined) currentPieceFeedback(game, 'Mouse aim');
          }
        } else {
          // Mouse inside or below grid: try to position piece at (newCol, row)
          // Clamp row to the grid bottom
          const targetRow = Math.min(row, ROWS - 1);
          if (!collides(game.grid, shape, newCol, targetRow)) {
            const oldCol = game.current.col;
            const oldRow = game.current.row;
            game.current.col = newCol;
            game.current.row = targetRow;
            game.current.fallAccum = 0;
            if (oldCol !== newCol || oldRow !== targetRow) currentPieceFeedback(game, 'Mouse aim');
          } else if (game.current.row !== undefined &&
                     !collides(game.grid, shape, newCol, game.current.row)) {
            // Target row blocked but row change failed — at least move the col
            game.current.col = newCol;
          } else if (game.current.row === undefined &&
                     isValidCol(game.grid, shape, newCol)) {
            // Still floating above
            game.current.col = newCol;
          }
        }
      }
    }
  }
});

function getCanvasMouse(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
}

canvas.addEventListener('click', e => {
  if (game.phase === 'menu') {
    const m = getCanvasMouse(e);
    // SETTINGS button (top right)
    if (menuSettingsBtnRect) {
      const r = menuSettingsBtnRect;
      if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
        game.menuMode = game.menuMode === 'settings' ? 'free' : 'settings';
        return;
      }
    }
    // Settings page: row clicks
    if (game.menuMode === 'settings') {
      for (const key of Object.keys(menuSettingsRowRects)) {
        for (const r of menuSettingsRowRects[key]) {
          if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
            settings[key] = r.value;
            saveSettings();
            return;
          }
        }
      }
      // BACK button
      if (menuSettingsBackRect) {
        const r = menuSettingsBackRect;
        if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
          game.menuMode = 'free';
          return;
        }
      }
      return; // don't pass through to other menu UI
    }
    // Top-level toggle (Free / Campaign)
    for (const r of menuTopToggleRects) {
      if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
        game.menuMode = r.mode;
        return;
      }
    }
    // Fall speed selector (legacy inline row — kept for backward compat if rendered)
    for (const r of menuFallSpeedRects) {
      if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
        settings.fallSpeed = r.value;
        saveSettings();
        return;
      }
    }
    if (game.menuMode === 'campaign') {
      // Level cards: single click starts the level
      for (const r of menuLevelRects) {
        if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
          game.selectedLevelIdx = r.idx;
          startGame(null, null, r.levelId);
          return;
        }
      }
      // PLAY button
      if (menuStartRect) {
        const r = menuStartRect;
        if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
          startGame(null, null, LEVELS[game.selectedLevelIdx].id);
          return;
        }
      }
      return;
    }
    // Free play
    for (const r of menuModeRects) {
      if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
        game.selectedModeIdx = r.idx;
        return;
      }
    }
    for (const r of menuPlatformRects) {
      if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
        // Single click starts the game with this platform + current mode
        game.selectedPlatformIdx = r.idx;
        startGame(r.pid, MODE_ORDER[game.selectedModeIdx]);
        return;
      }
    }
    if (menuStartRect) {
      const r = menuStartRect;
      if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
        startGame(PLATFORM_ORDER[game.selectedPlatformIdx], MODE_ORDER[game.selectedModeIdx]);
        return;
      }
    }
    return;
  }
  if (game.phase === 'gameOver') {
    if (game.gameOverTimer > 30) {
      if (game.level) startGame(null, null, game.level.id);
      else startGame();
    }
    return;
  }
  if (game.phase === 'playing' && game.current) {
    if (game.showHelp) {
      // Click anywhere to dismiss the help overlay
      game.showHelp = false;
      return;
    }
    // Palette button row (bottom of canvas)
    const m = getCanvasMouse(e);
    for (const r of paletteBtnRects) {
      if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
        if (r.kind === 'zodiac') handlePaletteZodiac(game, r.id);
        else if (r.kind === 'prima') handlePalettePrima(game, r.id);
        return;
      }
    }
    // If the piece is already in the grid (via mouse-Y positioning or fall
    // mode), lock at its current position. Otherwise start the drop animation
    // from above.
    if (game.current.row !== undefined) {
      lockFromCurrent(game);
    } else {
      startDrop(game);
    }
  }
});

canvas.addEventListener('wheel', e => {
  if (game.phase !== 'playing' || !game.current) return;
  e.preventDefault();
  const cur = game.current;
  const rotated = e.deltaY < 0 ? rotateCW(cur.shape) : rotateCCW(cur.shape);
  for (const kick of [0, -1, 1, -2, 2]) {
    if (isValidCol(game.grid, rotated, cur.col + kick)) {
      cur.shape = rotated;
      cur.col = cur.col + kick;
      currentPieceFeedback(game, e.deltaY < 0 ? 'Mouse wheel rotate clockwise' : 'Mouse wheel rotate counter-clockwise');
      break;
    }
  }
}, { passive: false });

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (game.phase !== 'playing' || !game.current) return;
  const cur = game.current;
  const rotated = rotateCW(cur.shape);
  for (const kick of [0, -1, 1, -2, 2]) {
    if (isValidCol(game.grid, rotated, cur.col + kick)) {
      cur.shape = rotated;
      cur.col = cur.col + kick;
      currentPieceFeedback(game, 'Right-click rotate clockwise');
      break;
    }
  }
});

// ===== GAME FLOW =====
function startGame(platformId, modeId, levelId) {
  if (levelId !== undefined && levelId !== null) {
    // Level mode: platform/mode come from level config
    game = createGame(null, null, levelId);
    game.menuMode = 'campaign';
  } else {
    const pid = platformId || (game ? game.platformId : 'seesaw');
    const mid = modeId || (game ? game.modeId : 'standard');
    localStorage.setItem('bb_lastPlatform', pid);
    localStorage.setItem('bb_lastMode', mid);
    game = createGame(pid, mid);
  }
  // Compute initial physics from starting grid (so pre-built levels start at the right tilt)
  const phys = computePhysics(game);
  game.targetTilt = phys.angle;
  game.tiltAngle = phys.angle;
  game.lastTorqueData = phys.torqueData;
  game.phase = 'playing';
  game.introTimer = 520;
  game.balanceWarningFrames = 0;
  spawnPiece(game);
  addFeedback(game, `Started ${game.mode.name} on ${game.platform.name}. First move: aim near center; ${tiltFeedback(game)}.`);
}

// Mark a level as complete; persist to localStorage
function markLevelComplete(levelId) {
  let done = [];
  try { done = JSON.parse(localStorage.getItem('bb_levelsDone') || '[]'); } catch (e) {}
  if (!done.includes(levelId)) {
    done.push(levelId);
    localStorage.setItem('bb_levelsDone', JSON.stringify(done));
  }
}

function isLevelComplete(levelId) {
  try {
    const done = JSON.parse(localStorage.getItem('bb_levelsDone') || '[]');
    return done.includes(levelId);
  } catch (e) { return false; }
}

function levelProgress(g, win) {
  const h = g.modeId === 'wildhunt' ? ensureWildHunt(g) : null;
  if (win.type === 'pieces') return g.piecesPlaced;
  if (win.type === 'dawn') return h ? h.dawn : 0;
  if (win.type === 'chronicle') return h ? h.chronicleEntries : 0;
  return g.score;
}

function levelGoalName(win) {
  if (win.type === 'pieces') return 'Pieces';
  if (win.type === 'dawn') return 'Dawn';
  if (win.type === 'chronicle') return 'Entries';
  return 'Score';
}

function levelGoalMenuText(win) {
  if (win.type === 'pieces') return win.target + ' pieces';
  if (win.type === 'dawn') return 'dawn ' + win.target;
  if (win.type === 'chronicle') return win.target + ' entries';
  return 'score ' + win.target;
}

function levelGoalSentence(win) {
  if (win.type === 'pieces') return 'GOAL: place ' + win.target + ' pieces';
  if (win.type === 'dawn') return 'GOAL: survive until dawn ' + win.target;
  if (win.type === 'chronicle') return 'GOAL: chronicle ' + win.target + ' Hunt entries';
  return 'GOAL: reach score ' + win.target;
}

// Check if current level's win condition is met. Called after each placement.
function checkLevelWin(g) {
  if (!g.level || g.levelComplete || g.phase === 'gameOver') return;
  const w = g.level.win;
  let done = false;
  if (w.type === 'pieces' && g.piecesPlaced >= w.target) done = true;
  if (w.type === 'score' && g.score >= w.target) done = true;
  if (w.type === 'dawn' && ensureWildHunt(g).dawn >= w.target) done = true;
  if (w.type === 'chronicle' && ensureWildHunt(g).chronicleEntries >= w.target) done = true;
  if (done) {
    g.levelComplete = true;
    g.phase = 'gameOver'; // reuse the screen path; renderer branches on levelComplete
    g.gameOverTimer = 0;
    markLevelComplete(g.level.id);
  }
}

function triggerGameOver(g) {
  g.phase = 'gameOver';
  g.gameOverTimer = 0;
  // Record who tipped (the player who just placed, if any)
  if (g.playerCount > 1 && g.lastPlacingPlayer) {
    g.tipperPlayer = g.lastPlacingPlayer;
  }
  if (g.score > g.highScore) {
    g.highScore = g.score;
    localStorage.setItem('bb_highscore_' + g.platformId + '_' + g.modeId, String(g.highScore));
  }
}

// ===== UPDATE =====
function update(g, dt) {
  if (g.phase === 'menu') return;

  if (g.introTimer > 0) g.introTimer = Math.max(0, g.introTimer - dt * 60);
  if (g.balanceWarningFrames > 0) g.balanceWarningFrames = Math.max(0, g.balanceWarningFrames - dt * 60);
  if (g.feedbackTimer > 0) g.feedbackTimer = Math.max(0, g.feedbackTimer - dt * 60);

  // Palette expiry check (auto-fire armed zodiac after 3s)
  checkPaletteExpiry(g);
  if (g.paletteFlashFrames > 0) g.paletteFlashFrames--;

  // dt-scaled lerp factor: 1 - (1 - base)^(dt * 60) approximates frame-rate-independent lerp
  const tiltLerp = 1 - Math.pow(1 - TILT_LERP, dt * 60);

  // Animate tilt
  const diff = g.targetTilt - g.tiltAngle;
  g.tiltAngle += diff * tiltLerp;

  // Shake decay (dt-scaled)
  const decayFactor = Math.pow(0.85, dt * 60);
  g.shakeX *= decayFactor;
  g.shakeY *= decayFactor;

  // Flash decay
  if (g.flashTimer > 0) g.flashTimer = Math.max(0, g.flashTimer - dt * 60);

  if (g.mode && g.mode.onUpdate) g.mode.onUpdate(g, dt);

  if (g.phase === 'gameOver') {
    g.gameOverTimer += dt * 60;
    // Exaggerate tilt on game over
    const overTilt = g.targetTilt > 0 ? Math.PI / 2.5 : -Math.PI / 2.5;
    const goLerp = 1 - Math.pow(1 - 0.03, dt * 60);
    g.tiltAngle += (overTilt - g.tiltAngle) * goLerp;
    return;
  }

  // Fall mode: while playing, descend the current piece at fallSpeed cells/sec.
  // Soft drop (Down arrow held) multiplies the fall rate.
  if (g.phase === 'playing' && g.current && g.current.row !== undefined && settings.fallSpeed > 0) {
    const cur = g.current;
    const speedMul = keys['ArrowDown'] ? settings.softDropMul : 1;
    if (settings.windSpeed) {
      cur.windAccum = (cur.windAccum || 0) + dt * settings.windSpeed;
      while (Math.abs(cur.windAccum) >= 1) {
        const dir = Math.sign(cur.windAccum);
        const newCol = cur.col + dir;
        if (!collides(g.grid, cur.shape, newCol, cur.row)) cur.col = newCol;
        cur.windAccum -= dir;
      }
    }
    cur.fallAccum += dt * settings.fallSpeed * speedMul;
    while (cur.fallAccum >= 1) {
      cur.fallAccum -= 1;
      const newRow = cur.row + 1;
      if (collides(g.grid, cur.shape, cur.col, newRow)) {
        // Can't move down — lock the piece at its current row
        lockFromCurrent(g);
        break;
      } else {
        cur.row = newRow;
      }
    }
  }

  if (g.phase === 'dropping') {
    g.dropY += DROP_SPEED * (settings.hardDropSpeedMul || 1) * dt;
    if (g.dropY >= g.dropTargetY) {
      g.dropY = g.dropTargetY;
      // Lock piece
      const dp = g.dropPiece;
      lockPiece(g, dp, g.dropCol, g.dropRow);
      g.dropPiece = null;

      // Shake proportional to tilt change
      const angleDelta = Math.abs(g.targetTilt - g.tiltAngle);
      g.shakeX = (Math.random() - 0.5) * angleDelta * 20 * settings.shakeMul;
      g.shakeY = (Math.random() - 0.5) * angleDelta * 10 * settings.shakeMul;

      // Check game over via active platform's stability rule
      if (!isStableEnoughAfterPlacement(g)) {
        triggerGameOver(g);
        return;
      }

      // Check if grid is topped out (landing row was negative)
      if (g.dropRow < 0) {
        triggerGameOver(g);
        return;
      }

      // Check level win condition (campaign mode only)
      checkLevelWin(g);
      if (g.levelComplete) return;

      // Hot-seat: advance to next player
      advancePlayer(g);

      // Spawn next
      g.phase = 'playing';
      spawnPiece(g);
    }
    return;
  }
}

// ===== RENDERING =====
function drawBlock(x, y, size, color, colorLight, colorDark, style) {
  if (style === 'mono') {
    // Flat block, slight inset, no bevel
    ctx.fillStyle = color;
    ctx.fillRect(x + 1, y + 1, size - 2, size - 2);
    return;
  }
  ctx.fillStyle = color;
  ctx.fillRect(x, y, size, size);
  // Bevel
  ctx.fillStyle = colorLight;
  ctx.fillRect(x, y, size, 3);
  ctx.fillRect(x, y, 3, size);
  ctx.fillStyle = colorDark;
  ctx.fillRect(x, y + size - 3, size, 3);
  ctx.fillRect(x + size - 3, y, 3, size);
  // Inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(x + 4, y + 4, size - 8, size - 8);
}

// Draws a player-color border ring around a cell to indicate which player
// placed it. Called from the placed-cell loop and from drawShape when a piece
// has playerId set.
function drawPlayerTint(x, y, playerId) {
  if (!playerId || !PLAYER_COLORS[playerId]) return;
  const pc = PLAYER_COLORS[playerId];
  ctx.strokeStyle = pc.primary;
  ctx.lineWidth = 2.5;
  ctx.strokeRect(x + 2, y + 2, CELL - 4, CELL - 4);
}

function drawShape(shape, x, y, color, colorLight, colorDark, alpha, style, marker, cellInfo) {
  // marker: piece-level {balloon, bomb, fuse, playerId}
  // cellInfo: optional 2D array same shape as `shape`, per-cell {color, colorLight, colorDark, symbol, trait}
  if (alpha !== undefined && alpha < 1) {
    ctx.globalAlpha = alpha;
  }
  const playerId = marker && marker.playerId;
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (shape[r][c]) {
        const bx = x + c * CELL, by = y + r * CELL;
        const ci = cellInfo && cellInfo[r] && cellInfo[r][c];
        const col  = ci ? ci.color      : color;
        const colL = ci ? ci.colorLight : colorLight;
        const colD = ci ? ci.colorDark  : colorDark;
        drawBlock(bx, by, CELL, col, colL, colD, style);
        if (style !== 'mono') {
          if (ci && ci.symbol) drawCellMarker(bx, by, { symbol: ci.symbol });
          if (marker) drawCellMarker(bx, by, marker);
          if (ci && ci.wildClass) drawWildCellOverlay(bx, by, ci);
        }
        // Hot-seat: tint the piece with the player's color
        if (playerId && game && game.playerCount > 1) drawPlayerTint(bx, by, playerId);
      }
    }
  }
  ctx.globalAlpha = 1;
}

function drawCellMarker(x, y, marker) {
  if (marker.symbol) {
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = `bold ${Math.floor(CELL * 0.55)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(marker.symbol, x + CELL / 2, y + CELL / 2 + 1);
    ctx.textBaseline = 'alphabetic';
  }
  if (marker.balloon) {
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + CELL / 2, y + CELL);
    ctx.quadraticCurveTo(x + CELL / 2 + 3, y + CELL + 5, x + CELL / 2 - 1, y + CELL + 9);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(x + 8, y + 8, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  if (marker.bomb && marker.fuse !== undefined && marker.fuse > 0) {
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 100);
    ctx.fillStyle = `rgba(255,${100 + pulse * 100},${100 + pulse * 100},0.5)`;
    ctx.fillRect(x + 5, y + 5, CELL - 10, CELL - 10);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(marker.fuse, x + CELL / 2, y + CELL / 2 + 5);
  }
}

function drawWildCellOverlay(x, y, marker) {
  if (marker.chronicled) {
    ctx.strokeStyle = '#f4d78a';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 2, y + 2, CELL - 4, CELL - 4);
    ctx.fillStyle = 'rgba(244, 215, 138, 0.18)';
    ctx.fillRect(x + 3, y + 3, CELL - 6, 4);
  }
  if (marker.wildDeceptive) {
    const pulse = 0.45 + 0.25 * Math.sin(Date.now() / 160);
    ctx.strokeStyle = `rgba(220, 240, 255, ${pulse})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x + 5, y + CELL - 6);
    ctx.lineTo(x + CELL - 5, y + 6);
    ctx.stroke();
  }
  if (marker.wildClass === 'chronicle') {
    ctx.strokeStyle = 'rgba(244, 215, 138, 0.7)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 5, y + 5, CELL - 10, CELL - 10);
  }
}

function drawPlatform(g) {
  const theme = g.mode.theme || {};
  const suppress = g.mode.suppressUI || {};

  // Support (fulcrum/base/pole) — drawn in screen space, doesn't rotate
  if (theme.fulcrumDot) {
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(FULCRUM_X, FULCRUM_Y + 4, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (!suppress.fulcrumTriangle) {
    g.platform.renderSupport(ctx);
  }

  // Rotated group: platform beam + grid + pieces
  ctx.save();
  ctx.translate(FULCRUM_X + g.shakeX, FULCRUM_Y + g.shakeY);
  ctx.rotate(g.tiltAngle);
  ctx.translate(-FULCRUM_X, -FULCRUM_Y);

  // Platform beam (thin in zen)
  const beamPad = 12;
  if (theme.beamHeight) {
    ctx.fillStyle = theme.beamColor || '#222';
    ctx.fillRect(GRID_LEFT - beamPad, PLATFORM_Y, GRID_W + beamPad * 2, theme.beamHeight);
  } else {
    ctx.fillStyle = '#3a3a5a';
    ctx.fillRect(GRID_LEFT - beamPad, PLATFORM_Y, GRID_W + beamPad * 2, 16);
    ctx.strokeStyle = '#5a5a7a';
    ctx.lineWidth = 2;
    ctx.strokeRect(GRID_LEFT - beamPad, PLATFORM_Y, GRID_W + beamPad * 2, 16);
  }

  // Grid background + lines (skipped if theme.grid === false)
  if (theme.grid !== false) {
    ctx.fillStyle = 'rgba(20, 20, 40, 0.6)';
    ctx.fillRect(GRID_LEFT, GRID_TOP, GRID_W, GRID_H);

    ctx.strokeStyle = 'rgba(100, 100, 140, 0.15)';
    ctx.lineWidth = 1;
    for (let c = 0; c <= COLS; c++) {
      const x = GRID_LEFT + c * CELL;
      ctx.beginPath();
      ctx.moveTo(x, GRID_TOP);
      ctx.lineTo(x, PLATFORM_Y);
      ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      const y = GRID_TOP + r * CELL;
      ctx.beginPath();
      ctx.moveTo(GRID_LEFT, y);
      ctx.lineTo(GRID_LEFT + GRID_W, y);
      ctx.stroke();
    }

    // Grid border
    ctx.strokeStyle = 'rgba(100, 100, 160, 0.4)';
    ctx.lineWidth = 2;
    ctx.strokeRect(GRID_LEFT, GRID_TOP, GRID_W, GRID_H);
  }

  const blockStyle = theme.blockStyle;

  // Line clear flash: overlay a bright bar on cleared rows that fades over 30 frames
  if (g.lineFlash && g.lineFlash.frames > 0) {
    const f = g.lineFlash.frames / 30;
    ctx.fillStyle = `rgba(255, 240, 120, ${f * 0.6})`;
    for (const rr of g.lineFlash.rows) {
      ctx.fillRect(GRID_LEFT, GRID_TOP + rr * CELL, GRID_W, CELL);
    }
    g.lineFlash.frames--;
  }

  // Placed pieces
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = g.grid[r][c];
      if (cell) {
        const x = GRID_LEFT + c * CELL, y = GRID_TOP + r * CELL;
        drawBlock(x, y, CELL, cell.color, cell.colorLight, cell.colorDark, blockStyle);
        if (blockStyle !== 'mono' && (cell.balloon || cell.bomb || cell.symbol)) {
          drawCellMarker(x, y, cell);
        }
        if (blockStyle !== 'mono' && cell.wildClass) drawWildCellOverlay(x, y, cell);
        // Hot-seat: tint with the placing player's color
        if (g.playerCount > 1 && cell.playerId) drawPlayerTint(x, y, cell.playerId);
      }
    }
  }

  // Ghost piece (landing preview)
  if (g.phase === 'playing' && g.current) {
    const cur = g.current;
    const landRow = findLandingRow(g.grid, cur.shape, cur.col);
    if (landRow >= -cur.shape.length) {
      drawShape(
        cur.shape,
        GRID_LEFT + cur.col * CELL,
        GRID_TOP + landRow * CELL,
        cur.color, cur.colorLight, cur.colorDark,
        blockStyle === 'mono' ? 0.12 : 0.25, blockStyle, cur, cur.cellInfo
      );
    }
  }

  // Current piece. In fall mode it's at cur.row (descending in the grid).
  // In floating mode it sits 2.5 cells above the grid.
  if (g.phase === 'playing' && g.current) {
    const cur = g.current;
    const inFall = cur.row !== undefined;
    const pieceY = inFall
      ? GRID_TOP + cur.row * CELL
      : GRID_TOP - CELL * 2.5;
    drawShape(
      cur.shape,
      GRID_LEFT + cur.col * CELL,
      pieceY,
      cur.color, cur.colorLight, cur.colorDark,
      1, blockStyle, cur, cur.cellInfo
    );
    // Arrow indicator (only useful in floating mode; in fall mode the piece
    // is visibly already on the grid)
    if (!inFall && !suppress.controls) {
      const arrowX = GRID_LEFT + cur.col * CELL + (cur.shape[0].length * CELL) / 2;
      const arrowY = GRID_TOP - CELL * 0.3;
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.moveTo(arrowX - 6, arrowY - 10);
      ctx.lineTo(arrowX + 6, arrowY - 10);
      ctx.lineTo(arrowX, arrowY);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Dropping piece animation
  if (g.phase === 'dropping' && g.dropPiece) {
    const dp = g.dropPiece;
    drawShape(
      dp.shape,
      GRID_LEFT + g.dropCol * CELL,
      g.dropY,
      dp.color, dp.colorLight, dp.colorDark,
      1, blockStyle, dp, dp.cellInfo
    );
  }

  ctx.restore();

  if (g.modeId === 'alchemy') {
    ctx.textAlign = 'center';
    ctx.font = 'bold 11px "Segoe UI", sans-serif';
    ctx.fillStyle = 'rgba(190, 190, 220, 0.75)';
    ctx.fillText('LEFT: ☽ ♀ ♄', GRID_LEFT + 62, PLATFORM_Y + 44);
    ctx.fillText('RIGHT: ☉ ♂ ♃', GRID_LEFT + GRID_W - 62, PLATFORM_Y + 44);
    ctx.fillStyle = 'rgba(180, 220, 255, 0.75)';
    ctx.fillText('☿ either side', FULCRUM_X, PLATFORM_Y + 62);
  }
}

function drawTiltMeter(g) {
  const meterX = 600;
  const meterY = 240;
  const meterH = 200;
  const meterW = 20;

  // Background
  ctx.fillStyle = 'rgba(30, 30, 50, 0.8)';
  ctx.fillRect(meterX - 2, meterY - 2, meterW + 4, meterH + 4);
  ctx.strokeStyle = 'rgba(100, 100, 140, 0.5)';
  ctx.lineWidth = 1;
  ctx.strokeRect(meterX - 2, meterY - 2, meterW + 4, meterH + 4);

  // Fill based on tilt
  const tiltPct = Math.min(1, Math.abs(g.tiltAngle) / g.platform.maxTilt);
  const fillH = tiltPct * meterH;

  // Color gradient: green → yellow → red
  let fillColor;
  if (tiltPct < 0.5) {
    fillColor = `rgb(${Math.floor(tiltPct * 2 * 255)}, 200, 80)`;
  } else {
    fillColor = `rgb(255, ${Math.floor((1 - tiltPct) * 2 * 200)}, 60)`;
  }

  // Pulsing when dangerous
  if (tiltPct > 0.75) {
    const pulse = Math.sin(Date.now() / 100) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
  }

  ctx.fillStyle = fillColor;
  ctx.fillRect(meterX, meterY + meterH - fillH, meterW, fillH);
  ctx.globalAlpha = 1;

  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(meterX - 5, meterY + meterH / 2);
  ctx.lineTo(meterX + meterW + 5, meterY + meterH / 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Danger zone markers
  ctx.strokeStyle = 'rgba(255, 80, 80, 0.5)';
  ctx.lineWidth = 1;
  const dangerY = meterY + meterH * 0.15;
  ctx.beginPath();
  ctx.moveTo(meterX - 3, dangerY);
  ctx.lineTo(meterX + meterW + 3, dangerY);
  ctx.stroke();
  const dangerY2 = meterY + meterH * 0.85;
  ctx.beginPath();
  ctx.moveTo(meterX - 3, dangerY2);
  ctx.lineTo(meterX + meterW + 3, dangerY2);
  ctx.stroke();

  // Label
  ctx.fillStyle = '#8888aa';
  ctx.font = '11px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('TILT', meterX + meterW / 2, meterY - 8);

  // Direction arrow
  if (Math.abs(g.tiltAngle) > 0.05) {
    const dir = g.tiltAngle > 0 ? 'R' : 'L';
    ctx.fillStyle = tiltPct > 0.6 ? fillColor : '#aaaacc';
    ctx.font = 'bold 13px "Segoe UI", sans-serif';
    ctx.fillText(dir, meterX + meterW / 2, meterY + meterH + 18);
  }

  // Angle readout
  const degrees = Math.round(Math.abs(g.tiltAngle) * 180 / Math.PI);
  ctx.fillStyle = tiltPct > 0.75 ? fillColor : '#aaaacc';
  ctx.font = '12px "Segoe UI", sans-serif';
  ctx.fillText(degrees + '\u00B0', meterX + meterW / 2, meterY + meterH + 34);
}

function drawNextPieces(g) {
  const boxX = 600;
  const boxY = 60;

  ctx.fillStyle = '#aaaacc';
  ctx.font = 'bold 13px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT', boxX + 30, boxY - 8);

  for (let i = 0; i < g.next.length; i++) {
    const p = g.next[i];
    const py = boxY + i * 75;

    ctx.fillStyle = 'rgba(30, 30, 50, 0.6)';
    ctx.fillRect(boxX - 5, py - 3, 70, 65);
    ctx.strokeStyle = 'rgba(100, 100, 140, 0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(boxX - 5, py - 3, 70, 65);

    const shapeW = p.shape[0].length;
    const shapeH = p.shape.length;
    const previewCell = 16;
    const ox = boxX + (60 - shapeW * previewCell) / 2;
    const oy = py + (58 - shapeH * previewCell) / 2;

    for (let r = 0; r < p.shape.length; r++) {
      for (let c = 0; c < p.shape[r].length; c++) {
        if (p.shape[r][c]) {
          const ci = p.cellInfo && p.cellInfo[r] && p.cellInfo[r][c];
          const col  = ci ? ci.color      : p.color;
          const colL = ci ? ci.colorLight : p.colorLight;
          const colD = ci ? ci.colorDark  : p.colorDark;
          const px = ox + c * previewCell, py2 = oy + r * previewCell;
          drawBlock(px, py2, previewCell, col, colL, colD);
          if (ci && ci.symbol) {
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.font = 'bold 11px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(ci.symbol, px + previewCell/2, py2 + previewCell/2 + 1);
            ctx.textBaseline = 'alphabetic';
          }
        }
      }
    }
    if (p.balloon) {
      ctx.fillStyle = '#9df';
      ctx.font = 'bold 9px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('BALLOON', boxX + 30, py + 70);
    }
    if (p.bomb) {
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 100);
      ctx.fillStyle = `rgba(255,${100 + pulse * 100},${100 + pulse * 100},1)`;
      ctx.font = 'bold 10px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('BOMB!', boxX + 30, py + 70);
    }
    if (p.hasItem) {
      ctx.fillStyle = p.hasItem.color;
      ctx.font = 'bold 9px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(p.hasItem.emoji + ' ' + p.hasItem.name.toUpperCase(), boxX + 30, py + 70);
    }
    if (g.modeId === 'wildhunt') {
      const label = firstWildLabel(p);
      if (label) {
        ctx.fillStyle = '#d7c38a';
        ctx.font = 'bold 8px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(label.toUpperCase(), boxX + 30, py + 70);
      }
    }
  }
}

function firstWildLabel(piece) {
  if (!piece.cellInfo) return '';
  for (let r = 0; r < piece.cellInfo.length; r++) {
    for (let c = 0; c < piece.cellInfo[r].length; c++) {
      const ci = piece.cellInfo[r][c];
      if (ci && ci.wildName) return ci.wildName;
    }
  }
  return '';
}

function drawScore(g) {
  ctx.textAlign = 'left';

  // Hot-seat: current player banner across the top
  if (g.playerCount > 1) {
    const pc = PLAYER_COLORS[g.currentPlayer];
    const bw = 280, bh = 32, bx = (CANVAS_W - bw) / 2, by = g.level ? 46 : 12;
    ctx.fillStyle = pc.primary;
    ctx.fillRect(bx, by, bw, bh);
    // Pulse glow on the active player banner
    const pulse = Math.sin(Date.now() / 350) * 0.15 + 0.85;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = pc.light;
    ctx.fillRect(bx + 1, by + 1, bw - 2, 3);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(pc.name.toUpperCase() + "'S TURN", bx + bw / 2, by + 22);
    ctx.textAlign = 'left';

    // Per-player scores (small chips at the top-right)
    const chipX = CANVAS_W - 20;
    let chipY = 80;
    for (let p = 1; p <= g.playerCount; p++) {
      const ppc = PLAYER_COLORS[p];
      const score = g.playerScores[p] || 0;
      const text = ppc.name + ': ' + score;
      ctx.font = (p === g.currentPlayer ? 'bold ' : '') + '11px "Segoe UI", sans-serif';
      const w = ctx.measureText(text).width;
      ctx.fillStyle = ppc.primary;
      ctx.fillRect(chipX - w - 12, chipY - 10, w + 12, 18);
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'right';
      ctx.fillText(text, chipX - 6, chipY + 3);
      ctx.textAlign = 'left';
      chipY += 22;
    }
  }

  // Level goal banner (top center)
  if (g.level) {
    const w = g.level.win;
    const cur = levelProgress(g, w);
    const pct = Math.min(1, cur / w.target);
    const bw = 280, bh = 28, bx = (CANVAS_W - bw) / 2, by = 12;
    ctx.fillStyle = 'rgba(20, 20, 40, 0.85)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = '#ffa726';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, bh);
    // Progress fill
    ctx.fillStyle = pct >= 1 ? 'rgba(80,200,80,0.4)' : 'rgba(255,167,38,0.25)';
    ctx.fillRect(bx + 1, by + 1, (bw - 2) * pct, bh - 2);
    // Text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('LEVEL ' + g.level.id + ' • ' + g.level.name.toUpperCase(), bx + bw/2, by + 13);
    ctx.fillStyle = '#ffd';
    ctx.font = '11px "Segoe UI", sans-serif';
    const goal = levelGoalName(w);
    ctx.fillText(goal + ': ' + cur + ' / ' + w.target, bx + bw/2, by + 25);
    ctx.textAlign = 'left';
  }

  const hasBonus = (g.alchemyBonus || 0) || (g.lineBonus || 0) || (g.wildBonus || 0);
  ctx.fillStyle = '#8888aa';
  ctx.font = '12px "Segoe UI", sans-serif';
  ctx.fillText(hasBonus ? 'SCORE' : 'PIECES', 30, 55);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 32px "Segoe UI", sans-serif';
  ctx.fillText(String(g.score), 30, 90);

  // Show breakdown when any bonus is active
  if (hasBonus) {
    let bonusY = 108;
    ctx.fillStyle = '#888899';
    ctx.font = '11px "Segoe UI", sans-serif';
    ctx.fillText(g.piecesPlaced + ' pieces', 30, bonusY);
    bonusY += 14;
    if (g.alchemyBonus) {
      ctx.fillStyle = g.alchemyBonus >= 0 ? '#5d5' : '#f55';
      ctx.fillText((g.alchemyBonus >= 0 ? '+' : '') + g.alchemyBonus + ' alchemy', 30, bonusY);
      bonusY += 14;
    }
    if (g.lineBonus) {
      ctx.fillStyle = '#ffd740';
      ctx.fillText('+' + g.lineBonus + ' lines (' + (g.linesCleared || 0) + ')', 30, bonusY);
      bonusY += 14;
    }
    if (g.wildBonus) {
      ctx.fillStyle = g.wildBonus >= 0 ? '#d7c38a' : '#f55';
      ctx.fillText((g.wildBonus >= 0 ? '+' : '') + g.wildBonus + ' chronicle', 30, bonusY);
      bonusY += 14;
    }
  }

  // Best score (only when no bonus is being displayed)
  if (!hasBonus) {
    ctx.fillStyle = '#666688';
    ctx.font = '12px "Segoe UI", sans-serif';
    ctx.fillText('BEST', 30, 120);
    ctx.fillStyle = '#aaaacc';
    ctx.font = 'bold 18px "Segoe UI", sans-serif';
    ctx.fillText(String(g.highScore), 30, 142);
  }

  // Alchemy floating notification when a slide just happened
  if (g.modeId === 'alchemy' && g.alchemyFlash && g.alchemyFlash.frames > 0) {
    g.alchemyFlash.frames--;
    const f = g.alchemyFlash;
    const fade = Math.min(1, f.frames / 30);
    ctx.fillStyle = f.delta >= 0 ? `rgba(120,255,120,${fade})` : `rgba(255,120,120,${fade})`;
    ctx.font = 'bold 22px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    const yOffset = (60 - f.frames) * 0.5;
    ctx.fillText((f.delta >= 0 ? '+' : '') + f.delta, FULCRUM_X, FULCRUM_Y + 60 - yOffset);
    if (f.exit) {
      const trait = TRAITS[f.exit.trait];
      ctx.fillStyle = f.exit.proper ? `rgba(190,255,190,${fade})` : `rgba(255,160,160,${fade})`;
      ctx.font = 'bold 11px "Segoe UI", sans-serif';
      const name = trait ? trait.name : 'Matter';
      const verdict = f.exit.proper ? 'proper ' : 'wrong ';
      ctx.fillText(name + ' off ' + f.exit.side + ' — ' + verdict + 'side', FULCRUM_X, FULCRUM_Y + 82 - yOffset);
    }
    ctx.textAlign = 'left';
  }

  if (g.modeId === 'wildhunt') drawWildHuntHUD(g);
}

function drawInputFeedback(g) {
  if (g.phase !== 'playing' && g.phase !== 'dropping') return;
  const log = g.feedbackLog || [];

  ctx.textAlign = 'left';
  ctx.fillStyle = '#5eead4';
  ctx.font = 'bold 10px "Segoe UI", sans-serif';
  ctx.fillText('INPUT FEEDBACK', panelX + 10, panelY + 16);

  ctx.font = '11px "Segoe UI", sans-serif';
  const latest = log[0] || `Waiting for input: ${g.current ? g.current.type + '-piece at ' + pieceColumnLabel(g.current) : tiltFeedback(g)}.`;

// Big "press H" overlay shown when game.showHelp is true
// Persistent palette button row at the very bottom of the canvas
let paletteBtnRects = [];

function drawPaletteButtons(g) {
  if (g.phase !== 'playing') return;
  paletteBtnRects = [];
  const rowY = CANVAS_H - 50;
  const btnW = 38, btnH = 38, gap = 2;
  const totalZ = 12 * btnW + 11 * gap;
  const divider = 12; // space between zodiac and Tria Prima groups
  const totalP = 3 * btnW + 2 * gap;
  const totalW = totalZ + divider + totalP;
  let x = (CANVAS_W - totalW) / 2;

  // Subtle background strip
  ctx.fillStyle = 'rgba(15, 15, 30, 0.85)';
  ctx.fillRect(0, rowY - 4, CANVAS_W, 50);
  ctx.strokeStyle = 'rgba(80, 80, 120, 0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, rowY - 4); ctx.lineTo(CANVAS_W, rowY - 4); ctx.stroke();

  // Zodiac buttons
  ZODIAC_PROCESSES.forEach((z, i) => {
    const armed = g.paletteZodiac === z.id;
    paletteBtnRects.push({ x, y: rowY, w: btnW, h: btnH, kind: 'zodiac', id: z.id });
    drawPaletteButton(x, rowY, btnW, btnH, z.sign, z.short, z.color, armed, String(i+1));
    x += btnW + gap;
  });

  // Divider
  ctx.strokeStyle = 'rgba(200, 160, 80, 0.5)';
  ctx.beginPath();
  ctx.moveTo(x + divider / 2, rowY + 4);
  ctx.lineTo(x + divider / 2, rowY + btnH - 4);
  ctx.stroke();
  x += divider;

  // Tria Prima buttons
  TRIA_PRIMA_BUTTONS.forEach((p, i) => {
    paletteBtnRects.push({ x, y: rowY, w: btnW, h: btnH, kind: 'prima', id: p.id });
    const armed = false; // Prima never "armed"
    drawPaletteButton(x, rowY, btnW, btnH, p.sign, p.short, p.color, armed, ['Q','W','E'][i]);
    x += btnW + gap;
  });

  // Compound flash indicator at top of row
  if (g.paletteFlashFrames > 0 && g.paletteFlash) {
    const fade = g.paletteFlashFrames / 30;
    const z = g.paletteFlash.zodiac, p = g.paletteFlash.prima;
    let txt = '';
    if (z && p) txt = z.sign + ' ' + z.process + ' + ' + p.sign + ' ' + p.name + ' = compound';
    else if (z) txt = z.sign + ' ' + z.process;
    else if (p) txt = p.sign + ' ' + p.name;
    ctx.fillStyle = `rgba(255, 240, 200, ${fade})`;
    ctx.font = '11px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(txt, CANVAS_W / 2, rowY - 8);
  }

  // Armed-zodiac hint
  if (g.paletteZodiac) {
    const z = ZODIAC_PROCESSES.find(x => x.id === g.paletteZodiac);
    const msLeft = Math.max(0, g.paletteExpiresAt - Date.now());
    ctx.fillStyle = '#ffa726';
    ctx.font = 'bold 11px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Now click Salt / Sulphur / Mercury (or wait — ' + (msLeft/1000).toFixed(1) + 's)',
      CANVAS_W / 2, rowY - 8);
  }
}

function drawPaletteButton(x, y, w, h, sign, short, color, armed, hotkey) {
  ctx.fillStyle = armed ? color : 'rgba(30, 30, 50, 0.85)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = armed ? '#ffd070' : color;
  ctx.lineWidth = armed ? 2 : 1;
  ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
  // Glyph
  ctx.fillStyle = armed ? '#0a0a1a' : color;
  ctx.font = 'bold 16px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(sign, x + w / 2, y + h / 2 - 3);
  ctx.textBaseline = 'alphabetic';
  // Process abbreviation
  ctx.fillStyle = armed ? '#0a0a1a' : '#888899';
  ctx.font = '8px "Segoe UI", sans-serif';
  ctx.fillText(short, x + w / 2, y + h - 4);
  // Hotkey corner label
  ctx.fillStyle = armed ? 'rgba(10,10,26,0.7)' : 'rgba(255, 255, 255, 0.25)';
  ctx.font = '7px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(hotkey, x + 2, y + 8);
  ctx.textAlign = 'center';
}

function drawHelpOverlay(g) {
  if (!g.showHelp) return;
  ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#cccce0';
  ctx.font = '14px "Segoe UI", sans-serif';
  ctx.fillText('Stack tetrominoes on the platform without tipping it past 45\u00b0.', CANVAS_W / 2, 110);

  // Two-column controls table
  ctx.textAlign = 'left';

    ['\u2190 / \u2192', 'Move piece left / right'],
    ['\u2191 or X', 'Rotate clockwise'],
    ['Z', 'Rotate counter-clockwise'],
    ['\u2193', 'Step piece into grid (slide under overhangs)'],
    ['Space', 'Hard drop / lock piece'],
    ['Esc', 'Back to menu (after game over)'],
    ['R', 'Restart current game']
  ];
  const right = [
    ['Mouse', 'Drag piece — X and Y both follow cursor'],
    ['Click', 'Lock piece at current position'],
    ['Wheel', 'Rotate piece'],
    ['Right-click', 'Rotate piece'],
    ['H or /', 'Toggle this help'],
    ['', '']
  ];

  ctx.fillStyle = '#88aacc';
  ctx.font = 'bold 12px "Segoe UI", sans-serif';
  ctx.fillText('KEYBOARD', colA, 140);
  ctx.fillText('MOUSE', colB, 140);

  ctx.font = '13px "Segoe UI", sans-serif';
  left.forEach((row, i) => {
    ctx.fillStyle = '#ffa726';
    ctx.font = 'bold 13px "Segoe UI", sans-serif';
    ctx.fillText(row[0], colA, rowY0 + i * rowH);

    ctx.font = '13px "Segoe UI", sans-serif';

  });

    if (!row[0]) return;

    ctx.font = 'bold 13px "Segoe UI", sans-serif';
    ctx.fillText(row[0], colB, rowY0 + i * rowH);
    ctx.fillStyle = '#cccce0';
    ctx.font = '13px "Segoe UI", sans-serif';
    ctx.fillText(row[1], colB + 90, rowY0 + i * rowH);

  // Mode-specific tips

  ctx.fillStyle = '#88aacc';
  ctx.font = 'bold 12px "Segoe UI", sans-serif';
  ctx.fillText('THIS MODE: ' + g.mode.name.toUpperCase(), CANVAS_W / 2, 380);
  ctx.fillStyle = '#cccce0';
  ctx.font = '12px "Segoe UI", sans-serif';
  // Wrap description
  const desc = g.mode.description || 'Place pieces to score. Don\'t tip the platform.';

  let yy = 405;

  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW) {
      ctx.fillText(line, CANVAS_W / 2, yy);
      line = w;
      yy += 18;
    } else {
      line = test;
    }

  if (line) ctx.fillText(line, CANVAS_W / 2, yy);

  const guide = MODE_GUIDES[g.modeId] || MODE_GUIDES.standard;

  ctx.fillText('GOOD FIRST MOVES', CANVAS_W / 2, yy + 24);
  ctx.fillStyle = '#cfd7e6';
  ctx.font = '10px "Segoe UI", sans-serif';
  ctx.fillText('Goal: ' + guide.goal, CANVAS_W / 2, yy + 42);
  ctx.fillText('Good move: ' + guide.goodMove, CANVAS_W / 2, yy + 57);
  ctx.fillText('Watch: ' + guide.watch, CANVAS_W / 2, yy + 72);

  if (g.level) {
    ctx.fillStyle = '#ffd';
    ctx.font = 'bold 12px "Segoe UI", sans-serif';
    ctx.fillText(levelGoalSentence(g.level.win), CANVAS_W / 2, yy + 94);
  }

  if (g.modeId === 'wildhunt') {
    const tips = [
      'Wild Hunt: date tokens (878) chronicle adjacent omens, hosts, riders, and apparitions.',
      'Gold-framed cells are chronicled. Mirror-slashed cells are deceptive until distilled.',
      'Every third placement fires an omen beat: hounds shove, wind drifts, hoofbeats shake, horn calls a rider.',
      'Virgo/Distillation or the alembic reveals deception; Salt/Fixation stabilizes; fire burns revealed illusions.',
      'Credibility is your intellectual footing. If it reaches zero, the chronicle collapses.'
    ];
    ctx.fillStyle = '#d7c38a';
    ctx.font = 'bold 11px "Segoe UI", sans-serif';
    ctx.fillText('WILD HUNT CHRONICLE RULES', CANVAS_W / 2, yy + (g.level ? 116 : 92));
    ctx.fillStyle = '#cfd7e6';
    ctx.font = '10px "Segoe UI", sans-serif';
    tips.forEach((tip, i) => ctx.fillText(tip, CANVAS_W / 2, yy + (g.level ? 136 : 112) + i * 15));
  }

  // Close hint
  const pulse = Math.sin(Date.now() / 400) * 0.2 + 0.8;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#aaaacc';
  ctx.font = '13px "Segoe UI", sans-serif';
  ctx.fillText('Press H, /, or click to close', CANVAS_W / 2, CANVAS_H - 30);
  ctx.globalAlpha = 1;
}

// Menu hit-test rects, populated each render
