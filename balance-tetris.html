// Generic settings-row drawer. Returns the hit-test rects.
function drawSettingRow(y, settingKey, options) {
  options = options || {};
  const spec = SETTING_SPECS[settingKey];
  if (!spec) return [];
  const rects = [];
  const labelText = spec.label;
  ctx.font = (options.bigLabel ? 'bold 12px ' : '10px ') + '"Segoe UI", sans-serif';
  const labelW = ctx.measureText(labelText).width + 14;
  const btnH = options.bigLabel ? 28 : 22;
  const gap = 4;
  ctx.font = 'bold ' + (options.bigLabel ? 12 : 10) + 'px "Segoe UI", sans-serif';
  const widths = spec.presets.map(p =>
    Math.max(options.bigLabel ? 70 : 48, ctx.measureText(p.label).width + 16));
  const totalW = labelW + widths.reduce((a, b) => a + b, 0) + gap * (widths.length - 1);
  let x = (CANVAS_W - totalW) / 2;
  ctx.fillStyle = '#aabbcc';
  ctx.font = (options.bigLabel ? 'bold 12px ' : '10px ') + '"Segoe UI", sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(labelText, x + labelW - 10, y + btnH / 2 + 4);
  ctx.textAlign = 'center';
  x += labelW;
  spec.presets.forEach((p, i) => {
    const w = widths[i];
    const cur = settings[settingKey];
    const sel = typeof p.value === 'number'
      ? Math.abs(cur - p.value) < 0.001
      : cur === p.value;
    rects.push({ x, y, w, h: btnH, value: p.value, settingKey });
    ctx.fillStyle = sel ? 'rgba(80, 220, 80, 0.18)' : 'rgba(30,30,50,0.5)';
    ctx.fillRect(x, y, w, btnH);
    ctx.strokeStyle = sel ? '#5d5' : 'rgba(100, 100, 140, 0.4)';
    ctx.lineWidth = sel ? 2 : 1;
    ctx.strokeRect(x, y, w, btnH);
    ctx.fillStyle = sel ? '#5d5' : '#bbbbcc';
    ctx.font = 'bold ' + (options.bigLabel ? 12 : 10) + 'px "Segoe UI", sans-serif';
    ctx.fillText(p.label, x + w / 2, y + (options.bigLabel ? 18 : 15));
    x += w + gap;
  });
  return rects;
}

function drawPlatformIcon(p, cx, cy) {
  // Simple iconic representation of each platform type
  ctx.save();
  ctx.translate(cx, cy);
  // Beam
  ctx.fillStyle = '#5a5a7a';
  ctx.fillRect(-40, -2, 80, 4);
  // Contour (if any) - mini bars on top of the beam
  if (p.contour) {
    ctx.fillStyle = '#7a7a9a';
    const segW = 80 / p.contour.length;
    const maxH = Math.max(...p.contour);
    for (let i = 0; i < p.contour.length; i++) {
      const h = p.contour[i];
      if (h > 0) {
        const barH = (h / Math.max(maxH, 1)) * 10;
        ctx.fillRect(-40 + i * segW, -2 - barH, segW - 0.5, barH);
      }
    }
  }
  // Support (varies)
  ctx.fillStyle = '#7a7a9a';
  if (p.id === 'twoFulcrum') {
    ctx.beginPath();
    ctx.moveTo(-22, 16); ctx.lineTo(-10, 16); ctx.lineTo(-16, 2); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(10, 16); ctx.lineTo(22, 16); ctx.lineTo(16, 2); ctx.closePath(); ctx.fill();
  } else if (p.id === 'wideBase') {
    ctx.beginPath();
    ctx.moveTo(-22, 16);
    ctx.lineTo(22, 16);
    ctx.lineTo(11, 2);
    ctx.lineTo(-11, 2);
    ctx.closePath();
    ctx.fill();
  } else if (p.id === 'narrowPole') {
    ctx.fillRect(-1, 2, 2, 18);
    ctx.fillRect(-10, 20, 20, 3);
  } else {
    // seesaw + all contoured platforms (which use seesaw support)
    ctx.beginPath();
    ctx.moveTo(-8, 16);
    ctx.lineTo(8, 16);
    ctx.lineTo(0, 2);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawGameOver(g) {
  const isZen = g.modeId === 'zen';
  const won = g.levelComplete;

  // Dim overlay
  const alpha = Math.min(isZen ? 0.85 : 0.7, g.gameOverTimer / 40);
  ctx.fillStyle = isZen ? `rgba(0, 0, 0, ${alpha})` : `rgba(10, 10, 26, ${alpha})`;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  if (g.gameOverTimer < 20) return;

  ctx.textAlign = 'center';

  // Level complete: green-themed celebration
  if (won) {
    const popIn = Math.min(1, (g.gameOverTimer - 20) / 25);
    ctx.fillStyle = `rgba(80, 220, 80, ${popIn})`;
    ctx.font = 'bold 44px "Segoe UI", sans-serif';
    ctx.fillText('LEVEL COMPLETE', CANVAS_W / 2, 200);
    ctx.fillStyle = `rgba(255, 255, 255, ${popIn})`;
    ctx.font = '20px "Segoe UI", sans-serif';
    ctx.fillText(g.level.name, CANVAS_W / 2, 240);
    ctx.fillStyle = `rgba(170, 200, 220, ${popIn})`;
    ctx.font = '15px "Segoe UI", sans-serif';
    const w = g.level.win;
    const text = levelGoalName(w) + ': ' + levelProgress(g, w) + ' / ' + w.target;
    ctx.fillText(text, CANVAS_W / 2, 270);

    // Find next level
    const nextLevel = LEVELS.find(L => L.id === g.level.id + 1);
    if (g.gameOverTimer > 50) {
      const pulse = Math.sin(Date.now() / 400) * 0.2 + 0.8;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#aaaacc';
      ctx.font = '14px "Segoe UI", sans-serif';
      if (nextLevel) {
        ctx.fillText('Enter — next level: ' + nextLevel.name, CANVAS_W / 2, 330);
      } else {
        ctx.fillText('Enter to replay', CANVAS_W / 2, 330);
      }
      ctx.fillText('Esc to choose level', CANVAS_W / 2, 354);
      ctx.globalAlpha = 1;
    }
    return;
  }

  if (isZen) {
    // Zen game-over: just the score in big serif
    const popIn = Math.min(1, (g.gameOverTimer - 20) / 25);
    ctx.fillStyle = `rgba(255,255,255,${popIn})`;
    ctx.font = `${100 + popIn * 18}px ui-serif, Georgia, serif`;
    ctx.fillText(g.score, CANVAS_W / 2, CANVAS_H / 2 + 40);
    if (g.gameOverTimer > 80) {
      ctx.fillStyle = '#444';
      ctx.font = '11px sans-serif';
      ctx.fillText('R     /     ESC', CANVAS_W / 2, CANVAS_H / 2 + 100);
    }
    return;
  }

  // Hot-seat: which player tipped, scoreboard
  if (g.playerCount > 1) {
    const tipper = g.tipperPlayer || g.lastPlacingPlayer || g.currentPlayer;
    const tpc = PLAYER_COLORS[tipper];
    ctx.fillStyle = tpc.primary;
    ctx.font = 'bold 36px "Segoe UI", sans-serif';
    ctx.fillText(tpc.name.toUpperCase() + ' TIPPED IT', CANVAS_W / 2, 200);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px "Segoe UI", sans-serif';
    ctx.fillText('Final scores', CANVAS_W / 2, 240);
    // Find winner (highest score, with tip-tiebreaker losing)
    let winnerId = 0, winnerScore = -1;
    for (let p = 1; p <= g.playerCount; p++) {
      if (p === tipper) continue;
      const s = g.playerScores[p] || 0;
      if (s > winnerScore) { winnerScore = s; winnerId = p; }
    }
    for (let p = 1; p <= g.playerCount; p++) {
      const ppc = PLAYER_COLORS[p];
      const y = 270 + (p - 1) * 28;
      const tag = (p === winnerId ? '★ ' : (p === tipper ? '✕ ' : '  ')) +
        ppc.name + ': ' + (g.playerScores[p] || 0) + ' pieces';
      ctx.fillStyle = (p === winnerId) ? '#ffd740' : (p === tipper ? '#888' : ppc.primary);
      ctx.font = (p === winnerId ? 'bold ' : '') + '17px "Segoe UI", sans-serif';
      ctx.fillText(tag, CANVAS_W / 2, y);
    }
  } else {
    // Solo game over (existing UI)
    ctx.fillStyle = '#ef5350';
    ctx.font = 'bold 42px "Segoe UI", sans-serif';
    ctx.fillText('TIPPED OVER!', CANVAS_W / 2, 220);

    ctx.fillStyle = '#ffffff';
    ctx.font = '20px "Segoe UI", sans-serif';
    ctx.fillText('Pieces placed: ' + g.score, CANVAS_W / 2, 280);

    if (g.score >= g.highScore && g.score > 0) {
      const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#ffd740';
      ctx.font = 'bold 22px "Segoe UI", sans-serif';
      ctx.fillText('NEW BEST!', CANVAS_W / 2, 320);
      ctx.globalAlpha = 1;
    } else {
      ctx.fillStyle = '#8888aa';
      ctx.font = '16px "Segoe UI", sans-serif';
      ctx.fillText('Best: ' + g.highScore, CANVAS_W / 2, 320);
    }
  }

  // Restart
  if (g.gameOverTimer > 40) {
    const pulse = Math.sin(Date.now() / 400) * 0.2 + 0.8;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#aaaacc';
    ctx.font = '16px "Segoe UI", sans-serif';
    ctx.fillText('R / Space / Click to retry — Esc to choose platform', CANVAS_W / 2, 390);
    ctx.globalAlpha = 1;
  }
}

function drawWrappedLines(text, x, y, maxW, lineH, align) {
  ctx.textAlign = align || 'left';
  const words = String(text || '').split(' ');
  let line = '';
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, y);
      line = word;
      y += lineH;
    } else {
      line = test;
    }
  }
  if (line) {
    ctx.fillText(line, x, y);
    y += lineH;
  }
  return y;
}

function drawModeInstructionCard(g) {
  if (g.phase !== 'playing') return;
  const shouldShow = g.introTimer > 0 || g.balanceWarningFrames > 0;
  if (!shouldShow) return;
  const guide = MODE_GUIDES[g.modeId] || MODE_GUIDES.standard;
  const x = 156, y = 104, w = 428;
  const h = g.balanceWarningFrames > 0 ? 126 : 146;
  ctx.save();
  ctx.globalAlpha = g.balanceWarningFrames > 0 ? 0.95 : Math.min(0.92, 0.55 + g.introTimer / 240);
  ctx.fillStyle = g.balanceWarningFrames > 0 ? 'rgba(54, 25, 25, 0.92)' : 'rgba(8, 15, 28, 0.9)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = g.balanceWarningFrames > 0 ? '#ffb36b' : '#5eead4';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
  ctx.globalAlpha = 1;
  ctx.fillStyle = g.balanceWarningFrames > 0 ? '#ffd2a6' : '#fef3c7';
  ctx.font = 'bold 14px "Segoe UI", sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(g.balanceWarningFrames > 0 ? 'BALANCE WARNING' : (g.mode.name.toUpperCase() + ' - WHAT TO DO'), x + 14, y + 24);

  ctx.fillStyle = '#d7e6ee';
  ctx.font = '12px "Segoe UI", sans-serif';
  let yy = y + 48;
  if (g.balanceWarningFrames > 0) {
    yy = drawWrappedLines('That opening move would normally tip the board. You got a teaching grace: place the next piece toward the high side or near center.', x + 14, yy, w - 28, 16);
  } else {
    yy = drawWrappedLines('Goal: ' + guide.goal, x + 14, yy, w - 28, 16);
    yy = drawWrappedLines('Good move: ' + guide.goodMove, x + 14, yy + 2, w - 28, 16);
    yy = drawWrappedLines('Watch: ' + guide.watch, x + 14, yy + 2, w - 28, 16);
  }
  ctx.fillStyle = '#9dbab4';
  ctx.font = '11px "Segoe UI", sans-serif';
  ctx.fillText('Press H for full rules.', x + 14, y + h - 12);
  ctx.restore();
}

function drawFlash(g) {
  if (g.flashTimer > 0) {
    ctx.fillStyle = `rgba(255, 255, 255, ${g.flashTimer / 60})`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }
}

function render(g) {
  const theme = g.mode.theme || {};
  const suppress = g.mode.suppressUI || {};

  // Clear
  ctx.fillStyle = theme.bg || '#0a0a1a';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  if (g.phase === 'menu') {
    drawMenu(g);
    return;
  }

  // Background grid pattern (skip in zen)
  if (!theme.bg) {
    ctx.strokeStyle = 'rgba(40, 40, 60, 0.5)';
    ctx.lineWidth = 1;
    for (let x = 0; x < CANVAS_W; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_H); ctx.stroke();
    }
    for (let y = 0; y < CANVAS_H; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke();
    }

    // Ground line
    ctx.fillStyle = '#1a1a3a';
    ctx.fillRect(0, FULCRUM_Y + 28, CANVAS_W, CANVAS_H - FULCRUM_Y - 28);
    ctx.strokeStyle = '#3a3a5a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, FULCRUM_Y + 28);
    ctx.lineTo(CANVAS_W, FULCRUM_Y + 28);
    ctx.stroke();
  }

  drawPlatform(g);
  if (!suppress.tilt)     drawTiltMeter(g);
  if (!suppress.next)     drawNextPieces(g);
  if (!suppress.score)    drawScore(g);
  if (!suppress.controls) drawControls(g);
  drawInputFeedback(g);
  drawFlash(g);

  // Palette button row at the bottom (during play, all modes)
  drawPaletteButtons(g);

  if (g.phase === 'gameOver') {
    drawGameOver(g);
  }

  drawModeInstructionCard(g);

  // Help overlay always renders last so it sits on top
  drawHelpOverlay(g);
}

// ===== GAME LOOP =====
const hashMode = location.hash === '#wildhunt' || location.hash === '#wildhunt-campaign' ? 'wildhunt' : null;
game = createGame(
  localStorage.getItem('bb_lastPlatform') || 'seesaw',
  hashMode || localStorage.getItem('bb_lastMode') || 'standard'
);
if (location.hash === '#wildhunt-campaign') {
  const firstWildLevel = LEVELS.findIndex(l => l.mode === 'wildhunt');
  game.menuMode = 'campaign';
  if (firstWildLevel >= 0) game.selectedLevelIdx = firstWildLevel;
}
let lastTime = 0;

function loop(timestamp) {
  const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.1) : 1/60;
  lastTime = timestamp;
  update(game, dt);
  render(game);
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
