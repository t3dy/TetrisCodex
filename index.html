// ===== CONSTANTS =====
const COLS = 10;
const ROWS = 10;
const CELL = 30;
const GRID_W = COLS * CELL;
const GRID_H = ROWS * CELL;

// ===== SETTINGS =====
// Persisted to localStorage. fallSpeed=0 means "no auto-fall" — pieces float
// above the grid until you press Space (legacy behavior). Higher values give
// classic-Tetris auto-fall, letting you slide pieces sideways into overhangs
// during the fall.
const DEFAULT_SETTINGS = {
  fallSpeed: 0,        // cells/sec; 0 = off, classic positioning behavior
  softDropMul: 12,     // multiplier when ArrowDown is held during fall
};

];

  } catch (e) {
    return Object.assign({}, DEFAULT_SETTINGS);

})();
function saveSettings() {

// Per-cell torque contribution. Mode can override via mode.cellTorque(cell, r, c, center).
// Default: (col - center) * (cell.weight || 1).
function cellContribution(cell, r, c, center) {
  // Platform-contour cells are part of the rigid platform itself; they don't
  // contribute torque (the platform's CoM is at the fulcrum by definition).
  if (cell.platform) return 0;
  if (game && game.mode && game.mode.cellTorque) {
    return game.mode.cellTorque(cell, r, c, center);
  }
  return (c - center) * (cell.weight || 1);
}

// Flood-fill: find connected groups of cells sharing the same trait.
// Returns [{trait, cells: [[r,c], ...]}, ...]. Cells without a trait are singletons.
// Parse a human-readable starting grid (array of 10 strings, 10 chars each).
// Each char is a piece letter (I/O/T/S/Z/J/L), space/. for empty.
// Special chars: 'b' = bomb cell (fuse 5), '@' = balloon cell.
// Returns a fresh 10×10 grid.
function parseStartGrid(rows) {
  const grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  for (let r = 0; r < Math.min(rows.length, ROWS); r++) {
    const row = rows[r];
    for (let c = 0; c < Math.min(row.length, COLS); c++) {
      const ch = row[c];
      if (ch === ' ' || ch === '.') continue;
      let cell = null;
      if (ch === 'b') {
        cell = { color: '#e22', colorLight: '#f88', colorDark: '#900', bomb: true, fuse: 5 };
      } else if (ch === '@') {
        cell = { color: '#9df', colorLight: '#cef', colorDark: '#5ab', balloon: true };
      } else {
        const letter = ch.toUpperCase();
        if (PIECE_COLORS[letter]) {
          cell = {
            color: PIECE_COLORS[letter],
            colorLight: PIECE_COLORS_LIGHT[letter],
            colorDark: PIECE_COLORS_DARK[letter]
          };
        }
      }
      if (!cell) continue;
      grid[r][c] = cell;
    }
  }
  return grid;
}

function findGroups(grid) {
  const visited = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  const groups = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (visited[r][c] || !grid[r][c]) continue;
      // Platform-contour cells are immovable — don't include them in any group
      if (grid[r][c].platform) { visited[r][c] = true; continue; }
      const trait = grid[r][c].trait;
      if (trait === undefined) {
        visited[r][c] = true;
        groups.push({ trait: null, cells: [[r, c]] });
        continue;
      }
      // BFS over same-trait 4-connected cells
      const cells = [];
      const stack = [[r, c]];
      while (stack.length) {
        const [rr, cc] = stack.pop();
        if (rr < 0 || rr >= ROWS || cc < 0 || cc >= COLS) continue;
        if (visited[rr][cc]) continue;
        const cell = grid[rr][cc];
        if (!cell || cell.trait !== trait) continue;
        visited[rr][cc] = true;
        cells.push([rr, cc]);
        stack.push([rr - 1, cc], [rr + 1, cc], [rr, cc - 1], [rr, cc + 1]);
      }
      groups.push({ trait, cells });
    }
  }
  return groups;
}

// ===== PLATFORM TYPES =====
// Each platform is a config object describing physics + render.
// Interface:
//   computeTorque(grid)  -> { torque, secondary } (secondary used by multi-fulcrum)
//   tiltAngle(torque)    -> radians
//   isStable(angle, torqueData) -> boolean
//   renderSupport(ctx)   -> draws fulcrum/base in screen space (does NOT rotate)
//   renderBeam(ctx, beamPad) -> draws the beam (called inside rotated context)
//   pivot                -> { x, y } in screen space (rotation center)

  seesaw: {

    difficulty: 'medium',
    stiffness: 25,

      const center = (COLS - 1) / 2;
      for (let r = 0; r < ROWS; r++) {

          if (grid[r][c]) t += cellContribution(grid[r][c], r, c, center);

      return { torque: t };
    },
    tiltAngle(td) { return Math.atan(td.torque / this.stiffness); },
    isStable(angle, td) { return Math.abs(angle) <= this.maxTilt; },
    renderSupport(ctx) {
      ctx.fillStyle = '#6a6a8a';
      ctx.beginPath();
      ctx.moveTo(FULCRUM_X - 25, FULCRUM_Y + 30);
      ctx.lineTo(FULCRUM_X + 25, FULCRUM_Y + 30);
      ctx.lineTo(FULCRUM_X, FULCRUM_Y - 5);
      ctx.closePath();

    maxTilt: Math.PI / 4,
    pivot: { x: FULCRUM_X, y: FULCRUM_Y },
    computeTorque(grid) {

      const center = (COLS - 1) / 2;

      const sign = Math.sign(td.torque);

    fulcrumOffsets: [-2.5, 2.5], // columns from center
    pivot: { x: FULCRUM_X, y: FULCRUM_Y },
    computeTorque(grid) {
      // Net torque around center (for visual tilt)
      // Plus per-fulcrum torque (mass on far-side of each fulcrum tries to tip it)
      let net = 0;
      let leftFail = 0;  // mass to the LEFT of left fulcrum
      let rightFail = 0; // mass to the RIGHT of right fulcrum
      const center = (COLS - 1) / 2;
      const leftF = center + this.fulcrumOffsets[0];
      const rightF = center + this.fulcrumOffsets[1];
      for (let r = 0; r < ROWS; r++) {

          if (!grid[r][c]) continue;
          net += cellContribution(grid[r][c], r, c, center);
          if (c < leftF) leftFail += (leftF - c);
          if (c > rightF) rightFail += (c - rightF);

      return { torque: net, leftFail, rightFail };

    tiltAngle(td) { return Math.atan(td.torque / this.stiffness); },

    renderSupport(ctx) {

        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#8a8aaa';
        ctx.lineWidth = 2;
        ctx.stroke();

const PLATFORM_ORDER = ['seesaw', 'wideBase', 'narrowPole', 'twoFulcrum', 'bowl', 'mountain', 'staircase', 'notched'];

// ===== MODES =====
// A Mode is a bundle of optional hooks. Default 'standard' is no-ops.
// Hooks (all optional):
//   onPiecePlaced(g, lockedCells)  - post-placement (settle effects)
//   onTorqueAdjust(g, baseTorque)  - modify torque before tilt calc
//   onUpdate(g, dt)                - per-frame update
//   onSpawn(g, piece)              - decorate piece on spawn
//   suppressUI: { score, tilt, next, controls } - hide HUD elements
//   theme: { bg, fg, blockStyle }  - visual overrides
//   getScore(g)                    - custom scoring (default = piecesPlaced)

const MODES = {
  standard: {
    id: 'standard',
    name: 'Standard',
    description: 'Pure balance survival. Stack pieces without tipping.',
    difficulty: 'normal'
  },
  zen: {
    id: 'zen',
    name: 'Zen',
    description: 'Stripped-down meditation mode. No HUD. Score appears only at game-over.',
    difficulty: 'normal',
    suppressUI: { score: true, tilt: true, next: true, controls: true, fulcrumTriangle: true },
    theme: {
      bg: '#000',
      grid: false,           // no grid lines
      beamColor: '#222',
      beamHeight: 2,         // thin line beam
      blockStyle: 'mono',    // single accent color
      fulcrumDot: true       // small dot instead of triangle
    },
    onSpawn(g, piece) {
      // In zen, override the piece color to the session accent
      piece.color = g.zenAccent;
      piece.colorLight = '#fff';
      piece.colorDark = g.zenAccent;
    }
  },
  balloons: {
    id: 'balloons',
    name: 'Balloons',
    description: '~1 in 5 pieces are balloons. Negative torque, scaled by height. Place high to lift heavy bottoms.',
    difficulty: 'normal',
    balloonChance: 0.2,
    onSpawn(g, piece) {
      // ~20% of pieces become balloons
      if (Math.random() < this.balloonChance) {
        piece.balloon = true;
        piece.color = '#9df';
        piece.colorLight = '#cef';
        piece.colorDark = '#5ab';
      }
    },
    cellTorque(cell, r, c, center) {
      if (cell.balloon) {
        // Negative torque scaled by height: row 0 (top) lifts hardest, row ROWS-1 (bottom) barely
        const heightFactor = 1 + (ROWS - 1 - r) * 0.4;
        return (c - center) * -1 * heightFactor;
      }
      return (c - center) * (cell.weight || 1);
    }
  },
  bombs: {
    id: 'bombs',
    name: 'Bombs',
    description: '~1 in 6 pieces is a bomb. After 5 turns, each bomb cell detonates a 3×3 area. Sudden mass loss = sudden tilt.',
    difficulty: 'hard',
    bombChance: 1/6,
    fuseLength: 5,
    onSpawn(g, piece) {
      if (Math.random() < this.bombChance) {
        piece.bomb = true;
        piece.fuse = this.fuseLength;
        piece.color = '#e22';
        piece.colorLight = '#f88';
        piece.colorDark = '#900';
      }
    },
    onPiecePlaced(g) {
      // Tick all bomb fuses; collect cells whose fuse hit zero
      const explosions = [];
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = g.grid[r][c];
          if (cell && cell.bomb && cell.fuse !== undefined) {
            cell.fuse--;
            if (cell.fuse <= 0) explosions.push([r, c]);
          }
        }
      }
      if (explosions.length === 0) return;
      // Detonate: clear 3x3 around each exploding cell (simultaneous, no cascade).
      // Platform-contour cells are indestructible and remain.
      for (const [r, c] of explosions) {
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            const rr = r + dr, cc = c + dc;
            if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS) {
              const cell = g.grid[rr][cc];
              if (cell && !cell.platform) g.grid[rr][cc] = null;
            }
          }
        }
      }
      // Visual: add shake proportional to number of detonations
      g.shakeX = (Math.random() - 0.5) * 30 * explosions.length;
      g.shakeY = (Math.random() - 0.5) * 15 * explosions.length;
      g.flashTimer = Math.max(g.flashTimer, 30);
    }
  },
  alchemy: {
    id: 'alchemy',
    name: 'Alchemy',
    description: 'Each cell carries a planetary sign. Same-sign cells fuse into groups. Tilt past 20° and groups slide downhill — over the edge: groups score +size, singletons score -1.',
    difficulty: 'hard',
    slideThreshold: Math.PI / 9, // 20°
    onSpawn(g, piece) {
      // Assign a random trait to every filled cell of this piece (per-cell, not per-piece)
      piece.cellInfo = [];
      for (let r = 0; r < piece.shape.length; r++) {
        piece.cellInfo[r] = [];
        for (let c = 0; c < piece.shape[r].length; c++) {
          if (!piece.shape[r][c]) { piece.cellInfo[r][c] = null; continue; }
          const t = TRAITS[Math.floor(Math.random() * TRAITS.length)];
          piece.cellInfo[r][c] = {
            trait: t.id,
            color: t.color,
            colorLight: t.colorLight,
            colorDark: t.colorDark,
            symbol: t.symbol
          };
        }
      }
    },
    onPiecePlaced(g) {
      // Compute would-be tilt from the just-placed grid; if past threshold, slide downhill.
      const phys = computePhysics(g);
      if (Math.abs(phys.angle) < this.slideThreshold) return;
      const dir = Math.sign(phys.angle);
      if (dir === 0) return;

      const groups = findGroups(g.grid);
      // Slide downhill-most groups first so they vacate space for uphill groups
      groups.sort((a, b) => {
        const aEdge = dir > 0
          ? Math.max.apply(null, a.cells.map(([, c]) => c))
          : Math.min.apply(null, a.cells.map(([, c]) => c));
        const bEdge = dir > 0
          ? Math.max.apply(null, b.cells.map(([, c]) => c))
          : Math.min.apply(null, b.cells.map(([, c]) => c));
        return dir > 0 ? bEdge - aEdge : aEdge - bEdge;
      });

      let scoreDelta = 0;
      let groupsLost = 0, cellsLost = 0;
      for (const group of groups) {
        const newCells = group.cells.map(([r, c]) => [r, c + dir]);
        const fallsOff = newCells.some(([, c]) => c < 0 || c >= COLS);
        if (fallsOff) {
          scoreDelta += group.cells.length >= 2 ? group.cells.length : -1;
          for (const [rr, cc] of group.cells) g.grid[rr][cc] = null;
          groupsLost++;
          cellsLost += group.cells.length;
          continue;
        }
        // Move only if all destination cells are clear (or in this group's own old footprint)
        const oldKeys = new Set(group.cells.map(([rr, cc]) => rr + ',' + cc));
        const blocked = newCells.some(([rr, cc]) => g.grid[rr][cc] && !oldKeys.has(rr + ',' + cc));
        if (blocked) continue;
        const data = group.cells.map(([rr, cc]) => g.grid[rr][cc]);
        for (const [rr, cc] of group.cells) g.grid[rr][cc] = null;
        newCells.forEach(([rr, cc], i) => { g.grid[rr][cc] = data[i]; });
      }

      if (cellsLost > 0) {
        g.alchemyBonus = (g.alchemyBonus || 0) + scoreDelta;
        g.score = g.piecesPlaced + g.alchemyBonus;
        // Brief notification overlay in the renderer
        g.alchemyFlash = { delta: scoreDelta, frames: 60 };
        g.flashTimer = Math.max(g.flashTimer, 20);
        // Light shake
        g.shakeX += (Math.random() - 0.5) * 8;
        g.shakeY += (Math.random() - 0.5) * 4;
      }
    }
  }
};

// ===== UTILITY =====
function rotateCW(shape) {
  const rows = shape.length, cols = shape[0].length;
  const r = [];
  for (let c = 0; c < cols; c++) {
    r.push([]);
    for (let row = rows - 1; row >= 0; row--) {
      r[c].push(shape[row][c]);
    }
  }
  return r;
}

function rotateCCW(shape) {
  return rotateCW(rotateCW(rotateCW(shape)));
}

function shuffled(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function screenToGridCol(mx, my, angle) {
  const dx = mx - FULCRUM_X;
  const dy = my - FULCRUM_Y;
  const cos = Math.cos(-angle);
  const sin = Math.sin(-angle);
  const lx = dx * cos - dy * sin + FULCRUM_X;
  return Math.floor((lx - GRID_LEFT) / CELL);
}

// ===== GAME STATE =====
let game = null;

function createGame(platformId, modeId, levelId) {
  // If levelId provided, override platform/mode from level config
  let level = null;
  let pid = platformId || 'seesaw';
  let mid = modeId || 'standard';
  if (levelId !== undefined && levelId !== null) {
    level = LEVELS.find(l => l.id === levelId);
    if (level) { pid = level.platform; mid = level.mode; }
  }
  const startGrid = level && level.startGrid
    ? parseStartGrid(level.startGrid)
    : Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  // Apply platform contour (pre-built platform-marker cells along a non-flat top)
  const platformDef = PLATFORMS[pid];
  if (platformDef && platformDef.contour) {
    for (let c = 0; c < COLS; c++) {
      const h = platformDef.contour[c] || 0;
      for (let i = 0; i < h; i++) {
        const r = ROWS - 1 - i;
        if (r < 0) break;
        // Don't overwrite startGrid cells (level designer's choice takes priority)
        if (!startGrid[r][c]) {
          startGrid[r][c] = {
            color: '#4a4a6a',
            colorLight: '#6a6a8a',
            colorDark: '#2a2a3a',
            platform: true
          };
        }
      }
    }
  }
  // Compute initial torque/tilt from the starting grid
  // (use a temp game stub since cellContribution checks game.mode)
  let initialTorque = 0, initialAngle = 0;
  // We'll set this properly after the game object is created (mode hooks reference it)
  return {
    phase: 'menu', // menu | playing | dropping | gameOver
    menuMode: 'free', // 'free' | 'campaign'
    platform: PLATFORMS[pid],
    platformId: pid,
    mode: MODES[mid],
    modeId: mid,
    level,
    levelComplete: false,
    selectedPlatformIdx: PLATFORM_ORDER.indexOf(pid),
    selectedModeIdx: MODE_ORDER.indexOf(mid),
    selectedLevelIdx: level ? LEVELS.findIndex(l => l.id === level.id) : 0,
    grid: startGrid,
    bag: [],
    current: null,    // { type, shape, color, colorDark, colorLight, col }
    next: [],         // array of 3 upcoming pieces
    score: 0,
    highScore: parseInt(localStorage.getItem('bb_highscore_' + pid + '_' + mid) || '0'),
    tiltAngle: 0,
    targetTilt: 0,
    lastTorqueData: { torque: 0 },
    piecesPlaced: 0,
    dropY: 0,
    dropTargetY: 0,
    dropPiece: null,
    dropCol: 0,
    dropRow: 0,
    mouseCol: -1,
    lastPlaceTime: 0,
    flashTimer: 0,
    gameOverTimer: 0,
    shakeX: 0,
    shakeY: 0,
    zenAccent: ZEN_ACCENTS[Math.floor(Math.random() * ZEN_ACCENTS.length)]
  };
}

// ===== PIECE MANAGEMENT =====
function nextFromBag(g) {
  if (g.bag.length === 0) {
    g.bag = shuffled(PIECE_TYPES);
  }
  return g.bag.pop();
}

function makePiece(type) {
  return {
    type,
    shape: PIECE_SHAPES[type].map(r => r.slice()),
    color: PIECE_COLORS[type],
    colorDark: PIECE_COLORS_DARK[type],
    colorLight: PIECE_COLORS_LIGHT[type],
    col: Math.floor((COLS - PIECE_SHAPES[type][0].length) / 2)
  };
}

function fillQueue(g) {
  while (g.next.length < 3) {
    const p = makePiece(nextFromBag(g));
    // Apply mode's onSpawn at queue time so the next-piece preview is accurate
    if (g.mode.onSpawn) g.mode.onSpawn(g, p);
    g.next.push(p);
  }
}

function spawnPiece(g) {
  fillQueue(g);
  g.current = g.next.shift();
  fillQueue(g);
  // Fall mode: piece starts above the grid and descends into it
  if (settings.fallSpeed > 0) {
    g.current.row = -g.current.shape.length;
    g.current.fallAccum = 0;
  }
  // If can't place at all at start position, adjust
  if (collides(g.grid, g.current.shape, g.current.col, 0)) {
    // Try to shift
    for (let offset = 0; offset <= COLS; offset++) {
      for (const dir of [0, -1, 1, -2, 2]) {
        const c = g.current.col + dir;
        if (c >= 0 && !collides(g.grid, g.current.shape, c, 0)) {
          g.current.col = c;
          return;
        }
      }
    }
  }
}

// ===== COLLISION =====
function collides(grid, shape, col, row) {
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const gr = row + r;
      const gc = col + c;
      if (gc < 0 || gc >= COLS) return true;
      if (gr >= ROWS) return true;
      if (gr >= 0 && grid[gr][gc] !== null) return true;
    }
  }
  return false;
}

function findLandingRow(grid, shape, col) {
  let row = -shape.length;
  while (row < ROWS) {
    if (collides(grid, shape, col, row + 1)) return row;
    row++;
  }
  return row;
}

function isValidCol(grid, shape, col) {
  // Check if piece fits horizontally
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const gc = col + c;
      if (gc < 0 || gc >= COLS) return false;
    }
  }
  return true;
}

// ===== PHYSICS =====
// Routes through the active platform.
function computePhysics(g) {
  const td = g.platform.computeTorque(g.grid);
  const angle = g.platform.tiltAngle(td);
  return { torqueData: td, angle };
}

// ===== PLACEMENT =====
function lockPiece(g, piece, col, row) {
  const shape = piece.shape;
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const gr = row + r;
      const gc = col + c;
      if (gr >= 0 && gr < ROWS && gc >= 0 && gc < COLS) {
        const cell = {
          color: piece.color,
          colorDark: piece.colorDark,
          colorLight: piece.colorLight
        };
        // Per-cell info from mode (Alchemy: trait-specific color + symbol)
        if (piece.cellInfo && piece.cellInfo[r] && piece.cellInfo[r][c]) {
          const ci = piece.cellInfo[r][c];
          cell.color = ci.color;
          cell.colorLight = ci.colorLight;
          cell.colorDark = ci.colorDark;
          if (ci.symbol !== undefined) cell.symbol = ci.symbol;
          if (ci.trait !== undefined) cell.trait = ci.trait;
        }
        // Propagate per-piece flags into the grid cell
        if (piece.balloon) cell.balloon = true;
        if (piece.bomb) { cell.bomb = true; cell.fuse = piece.fuse || 5; }
        if (piece.weight !== undefined) cell.weight = piece.weight;
        g.grid[gr][gc] = cell;
      }
    }
  }
  g.piecesPlaced++;
  g.score = g.piecesPlaced;
  // Mode hook: settle pass (bombs detonate, surfaces slide, etc.)
  // Runs BEFORE physics recompute so cascade effects on torque are reflected immediately.
  if (g.mode.onPiecePlaced) g.mode.onPiecePlaced(g);
  const phys = computePhysics(g);
  g.targetTilt = phys.angle;
  g.lastTorqueData = phys.torqueData;
  g.flashTimer = 15;
}

function startDrop(g) {
  const cur = g.current;
  const landRow = findLandingRow(g.grid, cur.shape, cur.col);
  g.dropPiece = cur;
  g.dropCol = cur.col;
  g.dropRow = landRow;
  g.dropY = GRID_TOP - CELL * 2;
  g.dropTargetY = GRID_TOP + landRow * CELL;
  g.phase = 'dropping';
  g.current = null;
}

// Used by fall mode: piece is already at cur.row, lock it directly without
// the dropping-animation phase. Runs all the same post-lock checks.
function lockFromCurrent(g) {
  const cur = g.current;
  const lr = cur.row;
  if (lr < 0) { triggerGameOver(g); return; }
  lockPiece(g, cur, cur.col, lr);
  g.dropRow = lr;
  // Shake proportional to tilt change
  const angleDelta = Math.abs(g.targetTilt - g.tiltAngle);
  g.shakeX = (Math.random() - 0.5) * angleDelta * 20;
  g.shakeY = (Math.random() - 0.5) * angleDelta * 10;
  if (!g.platform.isStable(g.targetTilt, g.lastTorqueData)) { triggerGameOver(g); return; }
  if (lr < 0) { triggerGameOver(g); return; }
  checkLevelWin(g);
  if (g.levelComplete) return;
  spawnPiece(g);
}

// ===== INPUT =====
const keys = {};

document.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;

  if (game.phase === 'menu') {
    if (e.code === 'KeyC') {
      // Toggle campaign/free
      game.menuMode = game.menuMode === 'campaign' ? 'free' : 'campaign';
    } else if (game.menuMode === 'campaign') {
      // Level grid navigation: 5 cols × 3 rows (15 levels)
      const COLS_GRID = 5;
      if (e.code === 'ArrowLeft') {
        game.selectedLevelIdx = (game.selectedLevelIdx - 1 + LEVELS.length) % LEVELS.length;
      } else if (e.code === 'ArrowRight') {
        game.selectedLevelIdx = (game.selectedLevelIdx + 1) % LEVELS.length;
      } else if (e.code === 'ArrowDown') {
        game.selectedLevelIdx = (game.selectedLevelIdx + COLS_GRID) % LEVELS.length;
      } else if (e.code === 'ArrowUp') {
        game.selectedLevelIdx = (game.selectedLevelIdx - COLS_GRID + LEVELS.length) % LEVELS.length;
      } else if (e.code === 'Enter' || e.code === 'Space') {
        startGame(null, null, LEVELS[game.selectedLevelIdx].id);
      }
    } else {
      // Free play
      if (e.code === 'ArrowLeft') {
        game.selectedPlatformIdx = (game.selectedPlatformIdx - 1 + PLATFORM_ORDER.length) % PLATFORM_ORDER.length;
      } else if (e.code === 'ArrowRight') {
        game.selectedPlatformIdx = (game.selectedPlatformIdx + 1) % PLATFORM_ORDER.length;
      } else if (e.code === 'Tab' || e.code === 'KeyM') {
        game.selectedModeIdx = (game.selectedModeIdx + 1) % MODE_ORDER.length;
      } else if (e.code === 'Enter' || e.code === 'Space') {
        startGame(PLATFORM_ORDER[game.selectedPlatformIdx], MODE_ORDER[game.selectedModeIdx]);
      }
    }
    e.preventDefault();
    return;
  }

  if (game.phase === 'gameOver') {
    if (e.code === 'Enter' && game.levelComplete) {
      // Advance to next level if available
      const next = LEVELS.find(L => L.id === game.level.id + 1);
      startGame(null, null, next ? next.id : game.level.id);
    } else if (e.code === 'KeyR' || e.code === 'Space' || e.code === 'Enter') {
      // Restart: same level if in campaign, same platform/mode otherwise
      if (game.level) {
        startGame(null, null, game.level.id);
      } else {
        startGame();
      }
    } else if (e.code === 'Escape') {
      // Back to menu (preserves the menuMode you were in)
      const wasCampaign = !!game.level;
      game = createGame(game.platformId, game.modeId);
      if (wasCampaign) game.menuMode = 'campaign';
    }
    e.preventDefault();
    return;
  }

  if (game.phase !== 'playing' || !game.current) return;

  // Help overlay toggle
  if (e.code === 'KeyH' || e.code === 'Slash') {
    game.showHelp = !game.showHelp;
    e.preventDefault();
    return;
  }

  const cur = game.current;
  const inFall = cur.row !== undefined; // fall mode is active for this piece
  // For fall mode, validate moves against the piece's current row (so it can't
  // pass through existing blocks at that row). For floating mode, just bounds.
  const canMove = (shape, col) => inFall
    ? !collides(game.grid, shape, col, cur.row)
    : isValidCol(game.grid, shape, col);

  switch (e.code) {
    case 'ArrowLeft':
      if (canMove(cur.shape, cur.col - 1)) cur.col--;
      break;
    case 'ArrowRight':
      if (canMove(cur.shape, cur.col + 1)) cur.col++;
      break;
    case 'ArrowUp':
    case 'KeyX': {
      const rotated = rotateCW(cur.shape);
      // Wall kick: try 0, -1, +1, -2, +2
      for (const kick of [0, -1, 1, -2, 2]) {
        if (canMove(rotated, cur.col + kick)) {
          cur.shape = rotated;
          cur.col += kick;
          break;
        }
      }
      break;
    }
    case 'KeyZ': {
      const rotated = rotateCCW(cur.shape);
      for (const kick of [0, -1, 1, -2, 2]) {
        if (canMove(rotated, cur.col + kick)) {
          cur.shape = rotated;
          cur.col += kick;
          break;
        }
      }
      break;
    }
    case 'Space':
    case 'Enter':
      // Hard drop: in fall mode, snap to landing and lock. In floating mode,
      // start the dropping animation as before.
      if (inFall) {
        const lr = findLandingRow(game.grid, cur.shape, cur.col);
        cur.row = Math.max(lr, cur.row);
        lockFromCurrent(game);
      } else {
        startDrop(game);
      }
      break;
    case 'ArrowDown':
      // In fall mode, ArrowDown is soft-drop (handled per-frame in update).
      // In floating mode, it acts like Space.
      if (!inFall) startDrop(game);
      break;
  }
  e.preventDefault();
});

document.addEventListener('keyup', e => {
  keys[e.code] = false;
});

// Mouse
let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top) * scaleY;

  if (game && game.phase === 'playing' && game.current) {
    const col = screenToGridCol(mouseX, mouseY, game.tiltAngle);
    if (col >= 0 && col < COLS) {
      game.mouseCol = col;
      const shape = game.current.shape;
      // Find leftmost / rightmost FILLED columns in the shape (ignoring empty
      // columns of the bounding box). Without this, a vertical I-piece
      // (filled cell only at relative col 2 of a 4-wide bbox) gets clamped
      // 3 columns short of the right edge.
      let leftFilled = shape[0].length, rightFilled = -1;
      for (let r = 0; r < shape.length; r++) {
        for (let c = 0; c < shape[r].length; c++) {
          if (shape[r][c]) {
            if (c < leftFilled)  leftFilled = c;
            if (c > rightFilled) rightFilled = c;
          }
        }
      }
      const filledW = rightFilled - leftFilled + 1;
      // Center the piece's filled span on the mouse column
      const desired = col - leftFilled - Math.floor(filledW / 2);
      // Clamp so the FILLED cells (not the bbox) stay on the grid
      const minCol = -leftFilled;            // leftmost filled cell at col 0
      const maxCol = COLS - 1 - rightFilled; // rightmost filled cell at col COLS-1
      const newCol = Math.max(minCol, Math.min(maxCol, desired));
      // In fall mode, also check that no placed cells block the move at the
      // current row. In floating mode, just bounds.
      const ok = game.current.row !== undefined
        ? !collides(game.grid, shape, newCol, game.current.row)
        : isValidCol(game.grid, shape, newCol);
      if (ok) {
        game.current.col = newCol;
      }
    }
  }
});

function getCanvasMouse(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
}

canvas.addEventListener('click', e => {
  if (game.phase === 'menu') {
    const m = getCanvasMouse(e);
    // Top-level toggle (Free / Campaign)
    for (const r of menuTopToggleRects) {
      if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
        game.menuMode = r.mode;
        return;
      }
    }
    // Fall speed selector
    for (const r of menuFallSpeedRects) {
      if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
        settings.fallSpeed = r.value;
        saveSettings();
        return;
      }
    }
    if (game.menuMode === 'campaign') {
      // Level cards: single click starts the level
      for (const r of menuLevelRects) {
        if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
          game.selectedLevelIdx = r.idx;
          startGame(null, null, r.levelId);
          return;
        }
      }
      // PLAY button
      if (menuStartRect) {
        const r = menuStartRect;
        if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
          startGame(null, null, LEVELS[game.selectedLevelIdx].id);
          return;
        }
      }
      return;
    }
    // Free play
    for (const r of menuModeRects) {
      if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
        game.selectedModeIdx = r.idx;
        return;
      }
    }
    for (const r of menuPlatformRects) {
      if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
        // Single click starts the game with this platform + current mode
        game.selectedPlatformIdx = r.idx;
        startGame(r.pid, MODE_ORDER[game.selectedModeIdx]);
        return;
      }
    }
    if (menuStartRect) {
      const r = menuStartRect;
      if (m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h) {
        startGame(PLATFORM_ORDER[game.selectedPlatformIdx], MODE_ORDER[game.selectedModeIdx]);
        return;
      }
    }
    return;
  }
  if (game.phase === 'gameOver') {
    if (game.gameOverTimer > 30) {
      if (game.level) startGame(null, null, game.level.id);
      else startGame();
    }
    return;
  }
  if (game.phase === 'playing' && game.current) {
    if (game.showHelp) {
      // Click anywhere to dismiss the help overlay
      game.showHelp = false;
      return;
    }
    startDrop(game);
  }
});

canvas.addEventListener('wheel', e => {
  if (game.phase !== 'playing' || !game.current) return;
  e.preventDefault();
  const cur = game.current;
  const rotated = e.deltaY < 0 ? rotateCW(cur.shape) : rotateCCW(cur.shape);
  for (const kick of [0, -1, 1, -2, 2]) {
    if (isValidCol(game.grid, rotated, cur.col + kick)) {
      cur.shape = rotated;
      cur.col = cur.col + kick;
      break;
    }
  }
}, { passive: false });

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (game.phase !== 'playing' || !game.current) return;
  const cur = game.current;
  const rotated = rotateCW(cur.shape);
  for (const kick of [0, -1, 1, -2, 2]) {
    if (isValidCol(game.grid, rotated, cur.col + kick)) {
      cur.shape = rotated;
      cur.col = cur.col + kick;
      break;
    }
  }
});

// ===== GAME FLOW =====
function startGame(platformId, modeId, levelId) {
  if (levelId !== undefined && levelId !== null) {
    // Level mode: platform/mode come from level config
    game = createGame(null, null, levelId);
    game.menuMode = 'campaign';
  } else {
    const pid = platformId || (game ? game.platformId : 'seesaw');
    const mid = modeId || (game ? game.modeId : 'standard');
    localStorage.setItem('bb_lastPlatform', pid);
    localStorage.setItem('bb_lastMode', mid);
    game = createGame(pid, mid);
  }
  // Compute initial physics from starting grid (so pre-built levels start at the right tilt)
  const phys = computePhysics(game);
  game.targetTilt = phys.angle;
  game.tiltAngle = phys.angle;
  game.lastTorqueData = phys.torqueData;
  game.phase = 'playing';
  spawnPiece(game);
}

// Mark a level as complete; persist to localStorage
function markLevelComplete(levelId) {
  let done = [];
  try { done = JSON.parse(localStorage.getItem('bb_levelsDone') || '[]'); } catch (e) {}
  if (!done.includes(levelId)) {
    done.push(levelId);
    localStorage.setItem('bb_levelsDone', JSON.stringify(done));
  }
}

function isLevelComplete(levelId) {
  try {
    const done = JSON.parse(localStorage.getItem('bb_levelsDone') || '[]');
    return done.includes(levelId);
  } catch (e) { return false; }
}

// Check if current level's win condition is met. Called after each placement.
function checkLevelWin(g) {
  if (!g.level || g.levelComplete || g.phase === 'gameOver') return;
  const w = g.level.win;
  let done = false;
  if (w.type === 'pieces' && g.piecesPlaced >= w.target) done = true;
  if (w.type === 'score' && g.score >= w.target) done = true;
  if (done) {
    g.levelComplete = true;
    g.phase = 'gameOver'; // reuse the screen path; renderer branches on levelComplete
    g.gameOverTimer = 0;
    markLevelComplete(g.level.id);
  }
}

function triggerGameOver(g) {
  g.phase = 'gameOver';
  g.gameOverTimer = 0;
  if (g.score > g.highScore) {
    g.highScore = g.score;
    localStorage.setItem('bb_highscore_' + g.platformId + '_' + g.modeId, String(g.highScore));
  }
}

// ===== UPDATE =====
function update(g, dt) {
  if (g.phase === 'menu') return;

  // dt-scaled lerp factor: 1 - (1 - base)^(dt * 60) approximates frame-rate-independent lerp
  const tiltLerp = 1 - Math.pow(1 - TILT_LERP, dt * 60);

  // Animate tilt
  const diff = g.targetTilt - g.tiltAngle;
  g.tiltAngle += diff * tiltLerp;

  // Shake decay (dt-scaled)
  const decayFactor = Math.pow(0.85, dt * 60);
  g.shakeX *= decayFactor;
  g.shakeY *= decayFactor;

  // Flash decay
  if (g.flashTimer > 0) g.flashTimer = Math.max(0, g.flashTimer - dt * 60);

  if (g.phase === 'gameOver') {
    g.gameOverTimer += dt * 60;
    // Exaggerate tilt on game over
    const overTilt = g.targetTilt > 0 ? Math.PI / 2.5 : -Math.PI / 2.5;
    const goLerp = 1 - Math.pow(1 - 0.03, dt * 60);
    g.tiltAngle += (overTilt - g.tiltAngle) * goLerp;
    return;
  }

  // Fall mode: while playing, descend the current piece at fallSpeed cells/sec.
  // Soft drop (Down arrow held) multiplies the fall rate.
  if (g.phase === 'playing' && g.current && g.current.row !== undefined && settings.fallSpeed > 0) {
    const cur = g.current;
    const speedMul = keys['ArrowDown'] ? settings.softDropMul : 1;
    cur.fallAccum += dt * settings.fallSpeed * speedMul;
    while (cur.fallAccum >= 1) {
      cur.fallAccum -= 1;
      const newRow = cur.row + 1;
      if (collides(g.grid, cur.shape, cur.col, newRow)) {
        // Can't move down — lock the piece at its current row
        lockFromCurrent(g);
        break;
      } else {
        cur.row = newRow;
      }
    }
  }

  if (g.phase === 'dropping') {
    g.dropY += DROP_SPEED * dt;
    if (g.dropY >= g.dropTargetY) {
      g.dropY = g.dropTargetY;
      // Lock piece
      const dp = g.dropPiece;
      lockPiece(g, dp, g.dropCol, g.dropRow);
      g.dropPiece = null;

      // Shake proportional to tilt change
      const angleDelta = Math.abs(g.targetTilt - g.tiltAngle);
      g.shakeX = (Math.random() - 0.5) * angleDelta * 20;
      g.shakeY = (Math.random() - 0.5) * angleDelta * 10;

      // Check game over via active platform's stability rule
      if (!g.platform.isStable(g.targetTilt, g.lastTorqueData)) {
        triggerGameOver(g);
        return;
      }

      // Check if grid is topped out (landing row was negative)
      if (g.dropRow < 0) {
        triggerGameOver(g);
        return;
      }

      // Check level win condition (campaign mode only)
      checkLevelWin(g);
      if (g.levelComplete) return;

      // Spawn next
      g.phase = 'playing';
      spawnPiece(g);
    }
    return;
  }
}

// ===== RENDERING =====
function drawBlock(x, y, size, color, colorLight, colorDark, style) {
  if (style === 'mono') {
    // Flat block, slight inset, no bevel
    ctx.fillStyle = color;
    ctx.fillRect(x + 1, y + 1, size - 2, size - 2);
    return;
  }
  ctx.fillStyle = color;
  ctx.fillRect(x, y, size, size);
  // Bevel
  ctx.fillStyle = colorLight;
  ctx.fillRect(x, y, size, 3);
  ctx.fillRect(x, y, 3, size);
  ctx.fillStyle = colorDark;
  ctx.fillRect(x, y + size - 3, size, 3);
  ctx.fillRect(x + size - 3, y, 3, size);
  // Inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(x + 4, y + 4, size - 8, size - 8);
}

function drawShape(shape, x, y, color, colorLight, colorDark, alpha, style, marker, cellInfo) {
  // marker: piece-level {balloon, bomb, fuse}
  // cellInfo: optional 2D array same shape as `shape`, per-cell {color, colorLight, colorDark, symbol, trait}
  if (alpha !== undefined && alpha < 1) {
    ctx.globalAlpha = alpha;
  }
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (shape[r][c]) {
        const bx = x + c * CELL, by = y + r * CELL;
        const ci = cellInfo && cellInfo[r] && cellInfo[r][c];
        const col  = ci ? ci.color      : color;
        const colL = ci ? ci.colorLight : colorLight;
        const colD = ci ? ci.colorDark  : colorDark;
        drawBlock(bx, by, CELL, col, colL, colD, style);
        if (style !== 'mono') {
          if (ci && ci.symbol) drawCellMarker(bx, by, { symbol: ci.symbol });
          if (marker) drawCellMarker(bx, by, marker);
        }
      }
    }
  }
  ctx.globalAlpha = 1;
}

function drawCellMarker(x, y, marker) {
  if (marker.symbol) {
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.font = `bold ${Math.floor(CELL * 0.55)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(marker.symbol, x + CELL / 2, y + CELL / 2 + 1);
    ctx.textBaseline = 'alphabetic';
  }
  if (marker.balloon) {
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + CELL / 2, y + CELL);
    ctx.quadraticCurveTo(x + CELL / 2 + 3, y + CELL + 5, x + CELL / 2 - 1, y + CELL + 9);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(x + 8, y + 8, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  if (marker.bomb && marker.fuse !== undefined && marker.fuse > 0) {
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 100);
    ctx.fillStyle = `rgba(255,${100 + pulse * 100},${100 + pulse * 100},0.5)`;
    ctx.fillRect(x + 5, y + 5, CELL - 10, CELL - 10);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 14px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(marker.fuse, x + CELL / 2, y + CELL / 2 + 5);
  }
}

function drawPlatform(g) {
  const theme = g.mode.theme || {};
  const suppress = g.mode.suppressUI || {};

  // Support (fulcrum/base/pole) — drawn in screen space, doesn't rotate
  if (theme.fulcrumDot) {
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(FULCRUM_X, FULCRUM_Y + 4, 3, 0, Math.PI * 2);
    ctx.fill();
  } else if (!suppress.fulcrumTriangle) {
    g.platform.renderSupport(ctx);
  }

  // Rotated group: platform beam + grid + pieces
  ctx.save();
  ctx.translate(FULCRUM_X + g.shakeX, FULCRUM_Y + g.shakeY);
  ctx.rotate(g.tiltAngle);
  ctx.translate(-FULCRUM_X, -FULCRUM_Y);

  // Platform beam (thin in zen)
  const beamPad = 12;
  if (theme.beamHeight) {
    ctx.fillStyle = theme.beamColor || '#222';
    ctx.fillRect(GRID_LEFT - beamPad, PLATFORM_Y, GRID_W + beamPad * 2, theme.beamHeight);
  } else {
    ctx.fillStyle = '#3a3a5a';
    ctx.fillRect(GRID_LEFT - beamPad, PLATFORM_Y, GRID_W + beamPad * 2, 16);
    ctx.strokeStyle = '#5a5a7a';
    ctx.lineWidth = 2;
    ctx.strokeRect(GRID_LEFT - beamPad, PLATFORM_Y, GRID_W + beamPad * 2, 16);
  }

  // Grid background + lines (skipped if theme.grid === false)
  if (theme.grid !== false) {
    ctx.fillStyle = 'rgba(20, 20, 40, 0.6)';
    ctx.fillRect(GRID_LEFT, GRID_TOP, GRID_W, GRID_H);

    ctx.strokeStyle = 'rgba(100, 100, 140, 0.15)';
    ctx.lineWidth = 1;
    for (let c = 0; c <= COLS; c++) {
      const x = GRID_LEFT + c * CELL;
      ctx.beginPath();
      ctx.moveTo(x, GRID_TOP);
      ctx.lineTo(x, PLATFORM_Y);
      ctx.stroke();
    }
    for (let r = 0; r <= ROWS; r++) {
      const y = GRID_TOP + r * CELL;
      ctx.beginPath();
      ctx.moveTo(GRID_LEFT, y);
      ctx.lineTo(GRID_LEFT + GRID_W, y);
      ctx.stroke();
    }

    // Grid border
    ctx.strokeStyle = 'rgba(100, 100, 160, 0.4)';
    ctx.lineWidth = 2;
    ctx.strokeRect(GRID_LEFT, GRID_TOP, GRID_W, GRID_H);
  }

  const blockStyle = theme.blockStyle;

  // Placed pieces
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = g.grid[r][c];
      if (cell) {
        const x = GRID_LEFT + c * CELL, y = GRID_TOP + r * CELL;
        drawBlock(x, y, CELL, cell.color, cell.colorLight, cell.colorDark, blockStyle);
        if (blockStyle !== 'mono' && (cell.balloon || cell.bomb || cell.symbol)) {
          drawCellMarker(x, y, cell);
        }
      }
    }
  }

  // Ghost piece (landing preview)
  if (g.phase === 'playing' && g.current) {
    const cur = g.current;
    const landRow = findLandingRow(g.grid, cur.shape, cur.col);
    if (landRow >= -cur.shape.length) {
      drawShape(
        cur.shape,
        GRID_LEFT + cur.col * CELL,
        GRID_TOP + landRow * CELL,
        cur.color, cur.colorLight, cur.colorDark,
        blockStyle === 'mono' ? 0.12 : 0.25, blockStyle, cur, cur.cellInfo
      );
    }
  }

  // Current piece. In fall mode it's at cur.row (descending in the grid).
  // In floating mode it sits 2.5 cells above the grid.
  if (g.phase === 'playing' && g.current) {
    const cur = g.current;
    const inFall = cur.row !== undefined;
    const pieceY = inFall
      ? GRID_TOP + cur.row * CELL
      : GRID_TOP - CELL * 2.5;
    drawShape(
      cur.shape,
      GRID_LEFT + cur.col * CELL,
      pieceY,
      cur.color, cur.colorLight, cur.colorDark,
      1, blockStyle, cur, cur.cellInfo
    );
    // Arrow indicator (only useful in floating mode; in fall mode the piece
    // is visibly already on the grid)
    if (!inFall && !suppress.controls) {
      const arrowX = GRID_LEFT + cur.col * CELL + (cur.shape[0].length * CELL) / 2;
      const arrowY = GRID_TOP - CELL * 0.3;
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.moveTo(arrowX - 6, arrowY - 10);
      ctx.lineTo(arrowX + 6, arrowY - 10);
      ctx.lineTo(arrowX, arrowY);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Dropping piece animation
  if (g.phase === 'dropping' && g.dropPiece) {
    const dp = g.dropPiece;
    drawShape(
      dp.shape,
      GRID_LEFT + g.dropCol * CELL,
      g.dropY,
      dp.color, dp.colorLight, dp.colorDark,
      1, blockStyle, dp, dp.cellInfo
    );
  }

  ctx.restore();
}

function drawTiltMeter(g) {
  const meterX = 600;
  const meterY = 240;
  const meterH = 200;
  const meterW = 20;

  // Background
  ctx.fillStyle = 'rgba(30, 30, 50, 0.8)';
  ctx.fillRect(meterX - 2, meterY - 2, meterW + 4, meterH + 4);
  ctx.strokeStyle = 'rgba(100, 100, 140, 0.5)';
  ctx.lineWidth = 1;
  ctx.strokeRect(meterX - 2, meterY - 2, meterW + 4, meterH + 4);

  // Fill based on tilt
  const tiltPct = Math.min(1, Math.abs(g.tiltAngle) / g.platform.maxTilt);
  const fillH = tiltPct * meterH;

  // Color gradient: green → yellow → red
  let fillColor;
  if (tiltPct < 0.5) {
    fillColor = `rgb(${Math.floor(tiltPct * 2 * 255)}, 200, 80)`;
  } else {
    fillColor = `rgb(255, ${Math.floor((1 - tiltPct) * 2 * 200)}, 60)`;
  }

  // Pulsing when dangerous
  if (tiltPct > 0.75) {
    const pulse = Math.sin(Date.now() / 100) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
  }

  ctx.fillStyle = fillColor;
  ctx.fillRect(meterX, meterY + meterH - fillH, meterW, fillH);
  ctx.globalAlpha = 1;

  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(meterX - 5, meterY + meterH / 2);
  ctx.lineTo(meterX + meterW + 5, meterY + meterH / 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // Danger zone markers
  ctx.strokeStyle = 'rgba(255, 80, 80, 0.5)';
  ctx.lineWidth = 1;
  const dangerY = meterY + meterH * 0.15;
  ctx.beginPath();
  ctx.moveTo(meterX - 3, dangerY);
  ctx.lineTo(meterX + meterW + 3, dangerY);
  ctx.stroke();
  const dangerY2 = meterY + meterH * 0.85;
  ctx.beginPath();
  ctx.moveTo(meterX - 3, dangerY2);
  ctx.lineTo(meterX + meterW + 3, dangerY2);
  ctx.stroke();

  // Label
  ctx.fillStyle = '#8888aa';
  ctx.font = '11px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('TILT', meterX + meterW / 2, meterY - 8);

  // Direction arrow
  if (Math.abs(g.tiltAngle) > 0.05) {
    const dir = g.tiltAngle > 0 ? 'R' : 'L';
    ctx.fillStyle = tiltPct > 0.6 ? fillColor : '#aaaacc';
    ctx.font = 'bold 13px "Segoe UI", sans-serif';
    ctx.fillText(dir, meterX + meterW / 2, meterY + meterH + 18);
  }

  // Angle readout
  const degrees = Math.round(Math.abs(g.tiltAngle) * 180 / Math.PI);
  ctx.fillStyle = tiltPct > 0.75 ? fillColor : '#aaaacc';
  ctx.font = '12px "Segoe UI", sans-serif';
  ctx.fillText(degrees + '\u00B0', meterX + meterW / 2, meterY + meterH + 34);
}

function drawNextPieces(g) {
  const boxX = 600;
  const boxY = 60;

  ctx.fillStyle = '#aaaacc';
  ctx.font = 'bold 13px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('NEXT', boxX + 30, boxY - 8);

  for (let i = 0; i < g.next.length; i++) {
    const p = g.next[i];
    const py = boxY + i * 75;

    ctx.fillStyle = 'rgba(30, 30, 50, 0.6)';
    ctx.fillRect(boxX - 5, py - 3, 70, 65);
    ctx.strokeStyle = 'rgba(100, 100, 140, 0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(boxX - 5, py - 3, 70, 65);

    const shapeW = p.shape[0].length;
    const shapeH = p.shape.length;
    const previewCell = 16;
    const ox = boxX + (60 - shapeW * previewCell) / 2;
    const oy = py + (58 - shapeH * previewCell) / 2;

    for (let r = 0; r < p.shape.length; r++) {
      for (let c = 0; c < p.shape[r].length; c++) {
        if (p.shape[r][c]) {
          const ci = p.cellInfo && p.cellInfo[r] && p.cellInfo[r][c];
          const col  = ci ? ci.color      : p.color;
          const colL = ci ? ci.colorLight : p.colorLight;
          const colD = ci ? ci.colorDark  : p.colorDark;
          const px = ox + c * previewCell, py2 = oy + r * previewCell;
          drawBlock(px, py2, previewCell, col, colL, colD);
          if (ci && ci.symbol) {
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.font = 'bold 11px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(ci.symbol, px + previewCell/2, py2 + previewCell/2 + 1);
            ctx.textBaseline = 'alphabetic';
          }
        }
      }
    }
    if (p.balloon) {
      ctx.fillStyle = '#9df';
      ctx.font = 'bold 9px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('BALLOON', boxX + 30, py + 70);
    }
    if (p.bomb) {
      const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 100);
      ctx.fillStyle = `rgba(255,${100 + pulse * 100},${100 + pulse * 100},1)`;
      ctx.font = 'bold 10px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('BOMB!', boxX + 30, py + 70);
    }
  }
}

function drawScore(g) {
  ctx.textAlign = 'left';

  // Level goal banner (top center)
  if (g.level) {
    const w = g.level.win;
    const cur = w.type === 'pieces' ? g.piecesPlaced : g.score;
    const pct = Math.min(1, cur / w.target);
    const bw = 280, bh = 28, bx = (CANVAS_W - bw) / 2, by = 12;
    ctx.fillStyle = 'rgba(20, 20, 40, 0.85)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = '#ffa726';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, bh);
    // Progress fill
    ctx.fillStyle = pct >= 1 ? 'rgba(80,200,80,0.4)' : 'rgba(255,167,38,0.25)';
    ctx.fillRect(bx + 1, by + 1, (bw - 2) * pct, bh - 2);
    // Text
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px "Segoe UI", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('LEVEL ' + g.level.id + ' • ' + g.level.name.toUpperCase(), bx + bw/2, by + 13);
    ctx.fillStyle = '#ffd';
    ctx.font = '11px "Segoe UI", sans-serif';
    const goal = w.type === 'pieces' ? 'Pieces' : 'Score';
    ctx.fillText(goal + ': ' + cur + ' / ' + w.target, bx + bw/2, by + 25);
    ctx.textAlign = 'left';
  }

  ctx.fillStyle = '#8888aa';
  ctx.font = '12px "Segoe UI", sans-serif';
  ctx.fillText(g.modeId === 'alchemy' ? 'SCORE' : 'PIECES', 30, 55);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 32px "Segoe UI", sans-serif';
  ctx.fillText(String(g.score), 30, 90);

  // Alchemy mode: show bonus separately
  if (g.modeId === 'alchemy') {
    const bonus = g.alchemyBonus || 0;
    ctx.fillStyle = '#888899';
    ctx.font = '11px "Segoe UI", sans-serif';
    ctx.fillText(g.piecesPlaced + ' pieces', 30, 108);
    ctx.fillStyle = bonus >= 0 ? '#5d5' : '#f55';
    ctx.fillText((bonus >= 0 ? '+' : '') + bonus + ' bonus', 30, 122);
    // Floating notification when a slide just happened
    if (g.alchemyFlash && g.alchemyFlash.frames > 0) {
      g.alchemyFlash.frames--;
      const f = g.alchemyFlash;
      const fade = Math.min(1, f.frames / 30);
      ctx.fillStyle = f.delta >= 0 ? `rgba(120,255,120,${fade})` : `rgba(255,120,120,${fade})`;
      ctx.font = 'bold 22px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      const yOffset = (60 - f.frames) * 0.5;
      ctx.fillText((f.delta >= 0 ? '+' : '') + f.delta, FULCRUM_X, FULCRUM_Y + 60 - yOffset);
      ctx.textAlign = 'left';
    }
  } else {
    ctx.fillStyle = '#666688';
    ctx.font = '12px "Segoe UI", sans-serif';
    ctx.fillText('BEST', 30, 120);

    ctx.fillStyle = '#aaaacc';
    ctx.font = 'bold 18px "Segoe UI", sans-serif';
    ctx.fillText(String(g.highScore), 30, 142);
  }
}

    ['Mouse', 'Move piece to column under cursor'],

  ];

  ctx.fillStyle = '#cccce0';
  ctx.font = '12px "Segoe UI", sans-serif';
  // Wrap description
  const desc = g.mode.description || 'Place pieces to score. Don\'t tip the platform.';
  const words = desc.split(' ');
  let line = '';
  let yy = 405;
  const maxW = CANVAS_W - 100;
  for (const w of words) {
    const test = line ? line + ' ' + w : w;
    if (ctx.measureText(test).width > maxW) {
      ctx.fillText(line, CANVAS_W / 2, yy);
      line = w;
      yy += 18;
    } else {
      line = test;
    }

  ctx.fillStyle = '#aaaacc';
  ctx.font = '13px "Segoe UI", sans-serif';
  ctx.fillText('Press H, /, or click to close', CANVAS_W / 2, CANVAS_H - 30);

}

function drawFallSpeedSelector(y) {

  const btnH = 22, gap = 4;

  ctx.font = 'bold 10px "Segoe UI", sans-serif';
  const widths = FALL_SPEED_PRESETS.map(p => Math.max(48, ctx.measureText(p.label).width + 16));
  const totalW = labelW + widths.reduce((a, b) => a + b, 0) + gap * (widths.length - 1);

    ctx.fillStyle = sel ? '#5d5' : '#bbbbcc';

function drawMenuCampaign(g) {
  ctx.textAlign = 'center';

  ctx.fillStyle = '#8888aa';
  ctx.font = '12px "Segoe UI", sans-serif';
  ctx.fillText('Pick a level. Each combines a platform, mode, and goal.', CANVAS_W / 2, 200);

  // Level grid: 5 cols × 4 rows (20 levels). Compact cards.
  menuLevelRects = [];
  const cols = 5;
  const cardW = 130, cardH = 72, gap = 6;
  const rows = Math.ceil(LEVELS.length / cols);
  const totalW = cardW * cols + gap * (cols - 1);
  const startX = (CANVAS_W - totalW) / 2;
  const startY = 212;

  for (let i = 0; i < LEVELS.length; i++) {
    const lev = LEVELS[i];
    const col = i % cols, row = Math.floor(i / cols);
    const x = startX + col * (cardW + gap);
    const y = startY + row * (cardH + gap);
    const sel = i === g.selectedLevelIdx;
    const done = isLevelComplete(lev.id);
    const isPuzzle = !!lev.startGrid;
    menuLevelRects.push({ x, y, w: cardW, h: cardH, idx: i, levelId: lev.id });

    // Card bg
    ctx.fillStyle = sel ? 'rgba(0, 229, 255, 0.14)' : 'rgba(30, 30, 50, 0.6)';
    ctx.fillRect(x, y, cardW, cardH);
    ctx.strokeStyle = sel ? '#00e5ff' : (done ? '#5d5' : 'rgba(100, 100, 140, 0.5)');
    ctx.lineWidth = sel ? 2 : 1;
    ctx.strokeRect(x, y, cardW, cardH);

    // Top row: level number (left) + stars (right) + check
    ctx.fillStyle = '#666688';
    ctx.font = 'bold 9px "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('LV ' + lev.id + (isPuzzle ? ' • PUZZLE' : ''), x + 6, y + 14);

    if (done) {
      ctx.fillStyle = '#5d5';
      ctx.font = 'bold 12px "Segoe UI", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('✓', x + cardW - 6, y + 14);
    } else {
      ctx.fillStyle = '#888';
      ctx.font = '9px "Segoe UI", sans-serif';
      ctx.textAlign = 'right';
      let stars = '';
      for (let s = 0; s < 5; s++) stars += s < lev.difficulty ? '●' : '○';
      ctx.fillText(stars, x + cardW - 6, y + 14);
    }

    // Name
    ctx.fillStyle = sel ? '#fff' : '#ddd';
    ctx.font = 'bold 11px "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(lev.name, x + 6, y + 29);

    // Mode + platform name
    ctx.fillStyle = '#888';
    ctx.font = '9px "Segoe UI", sans-serif';
    ctx.fillText(MODES[lev.mode].name + ' · ' + PLATFORMS[lev.platform].name, x + 6, y + 43);

    // Goal
    ctx.fillStyle = '#aac';
    ctx.font = '9px "Segoe UI", sans-serif';
    const goalText = lev.win.type === 'pieces'
      ? lev.win.target + ' pieces'
      : 'score ' + lev.win.target;
    ctx.fillText(goalText, x + 6, y + 57);

    // Mini platform icon (right side, bottom)
    ctx.save();
    drawPlatformIcon(PLATFORMS[lev.platform], x + cardW - 22, y + cardH - 14);
    ctx.restore();

    // Puzzle / contour marker at bottom right
    const hasContour = !!PLATFORMS[lev.platform].contour;
    if (isPuzzle || hasContour) {
      ctx.fillStyle = '#ffa726';
      ctx.font = 'bold 9px "Segoe UI", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText(isPuzzle ? '▦' : '◢◣', x + cardW - 6, y + cardH - 6);
    }
  }

  // Description of selected level
  const selLev = LEVELS[g.selectedLevelIdx];
  ctx.fillStyle = '#cccce0';
  ctx.font = '12px "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  // wrap if long
  const desc = selLev.description;
  ctx.fillText(desc, CANVAS_W / 2, startY + rows * (cardH + gap) + 10);

  // PLAY button
  const btnW = 220, btnH = 40;
  const btnX = (CANVAS_W - btnW) / 2;
  const btnY = startY + rows * (cardH + gap) + 25;
  menuStartRect = { x: btnX, y: btnY, w: btnW, h: btnH };
  const pulse = Math.sin(Date.now() / 400) * 0.2 + 0.8;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#ffa726';
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#0a0a1a';
  ctx.font = 'bold 15px "Segoe UI", sans-serif';
  ctx.fillText('PLAY LEVEL ' + selLev.id, btnX + btnW / 2, btnY + 26);

  // Hint
  ctx.fillStyle = '#ffa726';
  ctx.font = 'bold 12px "Segoe UI", sans-serif';
  ctx.fillText('CLICK ANY LEVEL TO PLAY IT', CANVAS_W / 2, btnY + btnH + 18);
  ctx.fillStyle = '#666688';
  ctx.font = '10px "Segoe UI", sans-serif';
  ctx.fillText('or arrow keys + Enter • ▦ marks puzzle levels with pre-built towers', CANVAS_W / 2, btnY + btnH + 36);
}

function drawPlatformIcon(p, cx, cy) {
  // Simple iconic representation of each platform type
  ctx.save();
  ctx.translate(cx, cy);
  // Beam
  ctx.fillStyle = '#5a5a7a';
  ctx.fillRect(-40, -2, 80, 4);
  // Contour (if any) - mini bars on top of the beam
  if (p.contour) {
    ctx.fillStyle = '#7a7a9a';
    const segW = 80 / p.contour.length;
    const maxH = Math.max(...p.contour);
    for (let i = 0; i < p.contour.length; i++) {
      const h = p.contour[i];
      if (h > 0) {
        const barH = (h / Math.max(maxH, 1)) * 10;
        ctx.fillRect(-40 + i * segW, -2 - barH, segW - 0.5, barH);
      }
    }
  }
  // Support (varies)
  ctx.fillStyle = '#7a7a9a';
  if (p.id === 'twoFulcrum') {
    ctx.beginPath();
    ctx.moveTo(-22, 16); ctx.lineTo(-10, 16); ctx.lineTo(-16, 2); ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(10, 16); ctx.lineTo(22, 16); ctx.lineTo(16, 2); ctx.closePath(); ctx.fill();
  } else if (p.id === 'wideBase') {
    ctx.beginPath();
    ctx.moveTo(-22, 16);
    ctx.lineTo(22, 16);
    ctx.lineTo(11, 2);
    ctx.lineTo(-11, 2);
    ctx.closePath();
    ctx.fill();
  } else if (p.id === 'narrowPole') {
    ctx.fillRect(-1, 2, 2, 18);
    ctx.fillRect(-10, 20, 20, 3);
  } else {
    // seesaw + all contoured platforms (which use seesaw support)
    ctx.beginPath();
    ctx.moveTo(-8, 16);
    ctx.lineTo(8, 16);
    ctx.lineTo(0, 2);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

function drawGameOver(g) {
  const isZen = g.modeId === 'zen';
  const won = g.levelComplete;

  // Dim overlay
  const alpha = Math.min(isZen ? 0.85 : 0.7, g.gameOverTimer / 40);
  ctx.fillStyle = isZen ? `rgba(0, 0, 0, ${alpha})` : `rgba(10, 10, 26, ${alpha})`;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  if (g.gameOverTimer < 20) return;

  ctx.textAlign = 'center';

  // Level complete: green-themed celebration
  if (won) {
    const popIn = Math.min(1, (g.gameOverTimer - 20) / 25);
    ctx.fillStyle = `rgba(80, 220, 80, ${popIn})`;
    ctx.font = 'bold 44px "Segoe UI", sans-serif';
    ctx.fillText('LEVEL COMPLETE', CANVAS_W / 2, 200);
    ctx.fillStyle = `rgba(255, 255, 255, ${popIn})`;
    ctx.font = '20px "Segoe UI", sans-serif';
    ctx.fillText(g.level.name, CANVAS_W / 2, 240);
    ctx.fillStyle = `rgba(170, 200, 220, ${popIn})`;
    ctx.font = '15px "Segoe UI", sans-serif';
    const w = g.level.win;
    const text = w.type === 'pieces'
      ? g.piecesPlaced + ' pieces placed'
      : 'score: ' + g.score;
    ctx.fillText(text, CANVAS_W / 2, 270);

    // Find next level
    const nextLevel = LEVELS.find(L => L.id === g.level.id + 1);
    if (g.gameOverTimer > 50) {
      const pulse = Math.sin(Date.now() / 400) * 0.2 + 0.8;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#aaaacc';
      ctx.font = '14px "Segoe UI", sans-serif';
      if (nextLevel) {
        ctx.fillText('Enter — next level: ' + nextLevel.name, CANVAS_W / 2, 330);
      } else {
        ctx.fillText('Enter to replay', CANVAS_W / 2, 330);
      }
      ctx.fillText('Esc to choose level', CANVAS_W / 2, 354);
      ctx.globalAlpha = 1;
    }
    return;
  }

  if (isZen) {
    // Zen game-over: just the score in big serif
    const popIn = Math.min(1, (g.gameOverTimer - 20) / 25);
    ctx.fillStyle = `rgba(255,255,255,${popIn})`;
    ctx.font = `${100 + popIn * 18}px ui-serif, Georgia, serif`;
    ctx.fillText(g.score, CANVAS_W / 2, CANVAS_H / 2 + 40);
    if (g.gameOverTimer > 80) {
      ctx.fillStyle = '#444';
      ctx.font = '11px sans-serif';
      ctx.fillText('R     /     ESC', CANVAS_W / 2, CANVAS_H / 2 + 100);
    }
    return;
  }

  // Game over text
  ctx.fillStyle = '#ef5350';
  ctx.font = 'bold 42px "Segoe UI", sans-serif';
  ctx.fillText('TIPPED OVER!', CANVAS_W / 2, 220);

  // Score
  ctx.fillStyle = '#ffffff';
  ctx.font = '20px "Segoe UI", sans-serif';
  ctx.fillText('Pieces placed: ' + g.score, CANVAS_W / 2, 280);

  // High score
  if (g.score >= g.highScore && g.score > 0) {
    const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffd740';
    ctx.font = 'bold 22px "Segoe UI", sans-serif';
    ctx.fillText('NEW BEST!', CANVAS_W / 2, 320);
    ctx.globalAlpha = 1;
  } else {
    ctx.fillStyle = '#8888aa';
    ctx.font = '16px "Segoe UI", sans-serif';
    ctx.fillText('Best: ' + g.highScore, CANVAS_W / 2, 320);
  }

  // Restart
  if (g.gameOverTimer > 40) {
    const pulse = Math.sin(Date.now() / 400) * 0.2 + 0.8;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#aaaacc';
    ctx.font = '16px "Segoe UI", sans-serif';
    ctx.fillText('R / Space / Click to retry — Esc to choose platform', CANVAS_W / 2, 390);
    ctx.globalAlpha = 1;
  }
}

function drawFlash(g) {
  if (g.flashTimer > 0) {
    ctx.fillStyle = `rgba(255, 255, 255, ${g.flashTimer / 60})`;
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }
}

function render(g) {
  const theme = g.mode.theme || {};
  const suppress = g.mode.suppressUI || {};

  // Clear
  ctx.fillStyle = theme.bg || '#0a0a1a';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  if (g.phase === 'menu') {
    drawMenu(g);
    return;
  }

  // Background grid pattern (skip in zen)
  if (!theme.bg) {
    ctx.strokeStyle = 'rgba(40, 40, 60, 0.5)';
    ctx.lineWidth = 1;
    for (let x = 0; x < CANVAS_W; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CANVAS_H); ctx.stroke();
    }
    for (let y = 0; y < CANVAS_H; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke();
    }

    // Ground line
    ctx.fillStyle = '#1a1a3a';
    ctx.fillRect(0, FULCRUM_Y + 28, CANVAS_W, CANVAS_H - FULCRUM_Y - 28);
    ctx.strokeStyle = '#3a3a5a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, FULCRUM_Y + 28);
    ctx.lineTo(CANVAS_W, FULCRUM_Y + 28);
    ctx.stroke();
  }

  drawPlatform(g);
  if (!suppress.tilt)     drawTiltMeter(g);
  if (!suppress.next)     drawNextPieces(g);
  if (!suppress.score)    drawScore(g);
  if (!suppress.controls) drawControls(g);
  drawFlash(g);

  if (g.phase === 'gameOver') {
    drawGameOver(g);
  }

  // Help overlay always renders last so it sits on top
  drawHelpOverlay(g);
}

// ===== GAME LOOP =====
game = createGame(
  localStorage.getItem('bb_lastPlatform') || 'seesaw',
  localStorage.getItem('bb_lastMode') || 'standard'
);
let lastTime = 0;

function loop(timestamp) {
  const dt = lastTime ? Math.min((timestamp - lastTime) / 1000, 0.1) : 1/60;
  lastTime = timestamp;
  update(game, dt);
  render(game);
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
