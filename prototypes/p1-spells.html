<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<title>P1: Spells</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;color:#aac;font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;padding:12px;min-height:100vh}
  h1{color:#fff;font-size:18px;margin-bottom:4px;font-weight:600}
  .info{color:#88a;font-size:12px;max-width:520px;text-align:center;margin-bottom:8px;line-height:1.4}
  canvas{display:block;background:#0a0a1a;border:1px solid #223;border-radius:4px}
  a.back{margin-top:10px;color:#48f;text-decoration:none;font-size:11px}
</style></head><body>
<h1>Prototype 1: Spells <span style="color:#ffa726;font-weight:400;font-size:13px;">— Tipsy Towers</span></h1>
<div class="info">Earn one spell card every 5 pieces survived. Press <b>1/2/3</b> to apply a spell to your NEXT piece. Don't let the platform tip past 45°.</div>
<canvas id="g" width="540" height="640"></canvas>
<a class="back" href="index.html">← back to prototypes</a>
<script>
const COLS=8, ROWS=10, CELL=32;
const STIFF=18, MAXTILT=Math.PI/4;
const GW=COLS*CELL, GH=ROWS*CELL;
const FX=270, FY=520, PY=505;
const GL=FX-GW/2, GT=PY-GH;

const SHAPES = {
  I:[[1,1,1,1]], O:[[1,1],[1,1]], T:[[0,1,0],[1,1,1]],
  S:[[0,1,1],[1,1,0]], Z:[[1,1,0],[0,1,1]],
  J:[[1,0,0],[1,1,1]], L:[[0,0,1],[1,1,1]]
};
const COL = {I:'#0fc',O:'#fd0',T:'#c4c',S:'#4d6',Z:'#e55',J:'#48d',L:'#fa3'};
const TYPES = Object.keys(SHAPES);

const SPELLS = [
  {id:'feather',name:'Featherweight',color:'#9ef',desc:'Next piece weight ×0.5'},
  {id:'anchor', name:'Anchor',       color:'#888',desc:'Next piece weight ×2'},
  {id:'flip',   name:'Mirror',       color:'#fc6',desc:'Next piece flipped horizontally'},
  {id:'tk',     name:'Telekinesis',  color:'#a8f',desc:'Next piece floats: no support needed'},
  {id:'quake',  name:'Quake',        color:'#f88',desc:'Re-roll the bag (new pieces upcoming)'}
];

let grid, bag, cur, nxt, score, tilt, target, phase;
let hand, modOnNext, sinceSpell;

function reset(){
  grid = Array.from({length:ROWS},()=>Array(COLS).fill(null));
  bag = []; nxt = drawPiece();
  cur = null; score=0; tilt=0; target=0; phase='play';
  hand = [];
  modOnNext = null;
  sinceSpell = 0;
  spawn();
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function drawPiece(){
  if(bag.length===0) bag = shuffle(TYPES.slice());
  const t = bag.pop();
  return {type:t, shape:SHAPES[t].map(r=>r.slice()), color:COL[t], col:Math.floor((COLS-SHAPES[t][0].length)/2), weight:1};
}
function rotateCW(s){const r=s.length,c=s[0].length;const o=[];for(let cc=0;cc<c;cc++){o.push([]);for(let rr=r-1;rr>=0;rr--)o[cc].push(s[rr][cc])}return o}
function collide(s,c,r){
  for(let rr=0;rr<s.length;rr++)for(let cc=0;cc<s[rr].length;cc++){
    if(!s[rr][cc])continue;
    const gr=r+rr, gc=c+cc;
    if(gc<0||gc>=COLS||gr>=ROWS) return true;
    if(gr>=0 && grid[gr][gc]) return true;
  }
  return false;
}
function fits(s,c){return !collide(s,c,0) || !collide(s,c,-1)}
function landRow(s,c){
  if(modOnNext && modOnNext.id==='tk'){
    return ROWS - s.length;
  }
  let r=-s.length; while(!collide(s,c,r+1) && r<ROWS) r++; return r;
}
function spawn(){
  cur = nxt; nxt = drawPiece();
  if(modOnNext){
    if(modOnNext.id==='feather') cur.weight=0.5;
    if(modOnNext.id==='anchor') cur.weight=2;
    if(modOnNext.id==='flip') cur.shape = cur.shape.map(r=>r.slice().reverse());
    if(modOnNext.id==='tk') cur.tk = true;
    if(modOnNext.id==='quake'){bag = shuffle(TYPES.slice());}
    cur.spellTint = modOnNext.color;
    modOnNext = null;
  }
  if(collide(cur.shape, cur.col, 0)){phase='over';}
}
function torque(){
  let t=0; const c=(COLS-1)/2;
  for(let r=0;r<ROWS;r++)for(let cc=0;cc<COLS;cc++){
    const cell=grid[r][cc]; if(cell) t += (cc-c) * (cell.weight||1);
  }
  return t;
}
function place(){
  const lr = landRow(cur.shape, cur.col);
  if(lr < 0){phase='over';return}
  for(let rr=0;rr<cur.shape.length;rr++)for(let cc=0;cc<cur.shape[rr].length;cc++){
    if(cur.shape[rr][cc]){
      const gr=lr+rr, gc=cur.col+cc;
      if(gr>=0 && gr<ROWS) grid[gr][gc] = {color:cur.color, weight:cur.weight, tint:cur.spellTint};
    }
  }
  score++; sinceSpell++;
  if(sinceSpell >= 5 && hand.length < 3){
    hand.push(SPELLS[Math.floor(Math.random()*SPELLS.length)]);
    sinceSpell = 0;
  }
  target = Math.atan(torque()/STIFF);
  if(Math.abs(target) > MAXTILT){phase='over';return}
  spawn();
}

const cv=document.getElementById('g'), ctx=cv.getContext('2d');
const keys={};
addEventListener('keydown', e=>{
  if(keys[e.code]) return; keys[e.code]=true;
  if(e.code==='KeyR'){reset();return}
  if(phase==='over') return;
  if(e.code==='ArrowLeft' && fits(cur.shape, cur.col-1)) cur.col--;
  else if(e.code==='ArrowRight' && fits(cur.shape, cur.col+1)) cur.col++;
  else if(e.code==='ArrowUp'){
    const r = rotateCW(cur.shape);
    for(const k of [0,-1,1,-2,2]){if(fits(r, cur.col+k)){cur.shape=r; cur.col+=k; break}}
  }
  else if(e.code==='Space') place();
  else if(e.code==='Digit1' || e.code==='Digit2' || e.code==='Digit3'){
    const idx = parseInt(e.code.slice(5))-1;
    if(hand[idx] && !modOnNext){
      modOnNext = hand[idx];
      hand.splice(idx,1);
    }
  }
  e.preventDefault();
});
addEventListener('keyup', e=>{keys[e.code]=false});

function drawBlock(x,y,c,tint){
  ctx.fillStyle=c; ctx.fillRect(x,y,CELL,CELL);
  ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fillRect(x,y,CELL,3); ctx.fillRect(x,y,3,CELL);
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(x,y+CELL-3,CELL,3); ctx.fillRect(x+CELL-3,y,3,CELL);
  if(tint){ctx.strokeStyle=tint; ctx.lineWidth=2; ctx.strokeRect(x+1,y+1,CELL-2,CELL-2)}
}

function render(){
  ctx.fillStyle='#0a0a1a'; ctx.fillRect(0,0,540,640);

  // Score + spell hand
  ctx.fillStyle='#fff'; ctx.font='bold 22px sans-serif'; ctx.textAlign='left';
  ctx.fillText(score, 14, 28);
  ctx.fillStyle='#778'; ctx.font='10px sans-serif'; ctx.fillText('PIECES', 14, 42);

  // Hand HUD
  ctx.fillStyle='#aac'; ctx.font='bold 11px sans-serif';
  ctx.fillText('SPELL HAND', 14, 74);
  for(let i=0;i<3;i++){
    const x=14, y=82+i*44;
    ctx.fillStyle = hand[i] ? hand[i].color : '#222';
    ctx.fillRect(x,y, 130, 38);
    if(hand[i]){
      ctx.fillStyle='#000'; ctx.font='bold 10px sans-serif'; ctx.fillText(hand[i].name, x+6, y+13);
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.font='9px sans-serif';
      const words = hand[i].desc.split(' ');
      let line = ''; let yy = y+24;
      for(const w of words){
        if((line + ' ' + w).length > 22){ctx.fillText(line, x+6, yy); line=w; yy+=10} else line = line ? line+' '+w : w;
      }
      if(line) ctx.fillText(line, x+6, yy);
      ctx.fillStyle='rgba(0,0,0,0.8)'; ctx.font='bold 10px sans-serif'; ctx.fillText('['+(i+1)+']', x+115, y+13);
    }
  }

  // pending modifier banner
  if(modOnNext){
    ctx.fillStyle = modOnNext.color;
    ctx.fillRect(14, 230, 130, 22);
    ctx.fillStyle='#000'; ctx.font='bold 11px sans-serif';
    ctx.fillText('NEXT: '+modOnNext.name, 19, 245);
  }

  // Next piece preview
  ctx.fillStyle='#aac'; ctx.font='bold 11px sans-serif'; ctx.textAlign='left';
  ctx.fillText('NEXT', 460, 30);
  if(nxt){
    const ps=14;
    for(let r=0;r<nxt.shape.length;r++)for(let c=0;c<nxt.shape[r].length;c++){
      if(nxt.shape[r][c]){ctx.fillStyle=nxt.color; ctx.fillRect(460+c*ps, 40+r*ps, ps-1, ps-1)}
    }
  }

  // Tilt animate
  tilt += (target - tilt) * 0.1;

  // Fulcrum (screen space)
  ctx.fillStyle='#556';
  ctx.beginPath(); ctx.moveTo(FX-22, FY+25); ctx.lineTo(FX+22, FY+25); ctx.lineTo(FX, FY-2); ctx.closePath(); ctx.fill();

  // Rotated platform
  ctx.save();
  ctx.translate(FX,FY); ctx.rotate(tilt); ctx.translate(-FX,-FY);

  ctx.fillStyle='#345'; ctx.fillRect(GL-10, PY, GW+20, 14);
  ctx.fillStyle='rgba(20,20,40,0.6)'; ctx.fillRect(GL,GT,GW,GH);
  ctx.strokeStyle='rgba(80,80,120,0.18)';
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(GL+c*CELL,GT);ctx.lineTo(GL+c*CELL,PY);ctx.stroke()}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(GL,GT+r*CELL);ctx.lineTo(GL+GW,GT+r*CELL);ctx.stroke()}

  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c]) drawBlock(GL+c*CELL, GT+r*CELL, grid[r][c].color, grid[r][c].tint);

  if(phase==='play' && cur){
    // Ghost
    const lr = landRow(cur.shape, cur.col);
    if(lr >= -cur.shape.length){
      ctx.globalAlpha = 0.25;
      for(let r=0;r<cur.shape.length;r++)for(let c=0;c<cur.shape[r].length;c++){
        if(cur.shape[r][c]) drawBlock(GL+(cur.col+c)*CELL, GT+(lr+r)*CELL, cur.color);
      }
      ctx.globalAlpha = 1;
    }
    // Current piece (above grid)
    for(let r=0;r<cur.shape.length;r++)for(let c=0;c<cur.shape[r].length;c++){
      if(cur.shape[r][c]) drawBlock(GL+(cur.col+c)*CELL, GT-CELL*2.5+r*CELL, cur.color, cur.spellTint);
    }
  }
  ctx.restore();

  if(phase==='over'){
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,540,640);
    ctx.fillStyle='#f55'; ctx.font='bold 36px sans-serif'; ctx.textAlign='center';
    ctx.fillText('TIPPED', 270, 280);
    ctx.fillStyle='#fff'; ctx.font='18px sans-serif'; ctx.fillText(score+' pieces', 270, 320);
    ctx.fillStyle='#aac'; ctx.font='14px sans-serif'; ctx.fillText('press R to restart', 270, 360);
  }
}

reset();
function loop(){render(); requestAnimationFrame(loop)}
loop();
</script>
</body></html>
